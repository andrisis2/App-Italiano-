<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Italiano</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="application-name" content="Italiano">
<meta name="apple-mobile-web-app-title" content="Italiano">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
  :root{
    --bg:#eef1f8; --bg2:#f8fafd;
    --card:#ffffff; --card2:#eef2f9; --line:#e3e8f1;
    --text:#16203a; --muted:#6c7891; --accent:#e2384b; --accent2:#2f6bed;
    --good:#16a34a; --bad:#dc2626; --radius:18px;
    --shadow-sm:0 1px 2px rgba(16,24,40,.06);
    --shadow:0 1px 3px rgba(16,24,40,.05), 0 10px 26px rgba(16,24,40,.07);
    --shadow-lg:0 6px 16px rgba(16,24,40,.08), 0 18px 40px rgba(16,24,40,.10);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0d1220; --bg2:#121a2b;
      --card:#1a2334; --card2:#243049; --line:#2c3a56;
      --text:#e9eef9; --muted:#9aa7c4; --accent:#ff5468; --accent2:#5b8cff;
      --good:#2dd36f; --bad:#ff5468;
      --shadow-sm:0 1px 2px rgba(0,0,0,.4);
      --shadow:0 1px 3px rgba(0,0,0,.45), 0 10px 26px rgba(0,0,0,.5);
      --shadow-lg:0 6px 16px rgba(0,0,0,.5), 0 18px 40px rgba(0,0,0,.6);
    }
    header{background:rgba(16,22,38,.78)!important}
    .speak:hover{background:#2c3a56!important}
    .opt:hover{background:rgba(91,140,255,.12)!important}
    .tile.wide{background:linear-gradient(120deg,var(--card) 0%,#26202c 100%)!important}
    .ref-note{background:rgba(91,140,255,.10)!important}
    table.ref tbody tr:nth-child(even) td{background:rgba(255,255,255,.03)!important}
    #splash{background:#0d1220}
  }
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes micpulse{0%,100%{box-shadow:0 6px 20px rgba(47,107,237,.35),0 0 0 0 rgba(47,107,237,.4)}70%{box-shadow:0 6px 20px rgba(47,107,237,.35),0 0 0 14px rgba(47,107,237,0)}}
  @keyframes sofiabounce{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-4px) scale(1.04)}}
  @keyframes sofiaglow{0%,100%{box-shadow:0 0 0 3px rgba(47,107,237,.35),0 4px 18px rgba(47,107,237,.18)}50%{box-shadow:0 0 0 6px rgba(47,107,237,.1),0 4px 18px rgba(47,107,237,.35)}}
  .mic-listening{animation:micpulse 1.6s ease-in-out infinite}
  @keyframes sofiamsg{from{opacity:0;transform:translateX(-14px) scale(.96)}to{opacity:1;transform:none}}
  .sofia-msg-row{display:flex;align-items:flex-end;gap:10px;animation:sofiamsg .22s ease}
  .sofia-av{
    width:48px;height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:28px;background:var(--card2);border-radius:50%;border:2px solid var(--line);
    align-self:flex-end;transition:border-color .3s;
  }
  .sofia-av.speaking{border-color:var(--accent2);animation:sofiabounce .7s ease-in-out infinite,sofiaglow 1.4s ease-in-out infinite}
  .sofia-fumetto{
    background:var(--card);border:2px solid var(--line);
    border-radius:16px 16px 16px 4px;
    padding:11px 15px;position:relative;
    max-width:calc(100% - 68px);
    font-size:15px;line-height:1.55;
    box-shadow:0 2px 12px rgba(0,0,0,.07);
  }
  .sofia-fumetto::before{
    content:"";position:absolute;left:-12px;bottom:16px;
    width:0;height:0;
    border-top:9px solid transparent;border-bottom:9px solid transparent;
    border-right:12px solid var(--line);
  }
  .sofia-fumetto::after{
    content:"";position:absolute;left:-9px;bottom:18px;
    width:0;height:0;
    border-top:7px solid transparent;border-bottom:7px solid transparent;
    border-right:9px solid var(--card);
  }
  .stage,.stats,.grid{animation:rise .3s ease both}
  .grid{animation-delay:.04s}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
    .flip.flipped .flash{transition:none}
    .mic-listening{animation:none}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 240px) fixed; color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; min-height:100dvh;
    padding-bottom:env(safe-area-inset-bottom);
    -webkit-font-smoothing:antialiased;
  }
  header{
    padding:8px 18px; padding-top:calc(8px + env(safe-area-inset-top));
    display:flex; align-items:flex-end; gap:12px; border-bottom:1px solid var(--line);
    position:sticky; top:0; background:rgba(255,255,255,.82); backdrop-filter:saturate(180%) blur(12px); z-index:5;
  }
  .arch-wrap{position:relative;flex:1;align-self:stretch;min-height:42px;}
  .arch-row{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:flex-end;justify-content:space-evenly;pointer-events:none;}
  .arch-row svg,.arch-row img{display:block;width:auto;object-fit:contain;}
  .back{background:none;border:none;color:var(--muted);font-size:15px;font-weight:600;cursor:pointer;padding:7px 11px;border-radius:10px;transition:.12s}
  .back:hover{background:var(--card2);color:var(--text)}
  main{flex:1; padding:18px; max-width:680px; width:100%; margin:0 auto}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:14px}
  .tile{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 16px; cursor:pointer; transition:transform .15s, box-shadow .15s, border-color .15s; text-align:left;
    display:flex; flex-direction:column; gap:10px; min-height:128px; box-shadow:var(--shadow-sm);
  }
  .tile:active{transform:scale(.97)}
  .tile:hover{transform:translateY(-3px); box-shadow:var(--shadow); border-color:transparent}
  .tile .ico{font-size:26px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;background:var(--card2);border-radius:14px;line-height:1}
  .tile .t{font-weight:700;font-size:16px;letter-spacing:.2px}
  .tile .d{font-size:12.5px;color:var(--muted);line-height:1.45}
  .tile .badge{font-size:11px;color:var(--accent);font-weight:600}
  .stats{display:flex;gap:10px;margin:2px 0 18px;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;flex:1;min-width:84px;text-align:center;box-shadow:var(--shadow-sm)}
  .stat b{display:block;font-size:24px;font-weight:800;letter-spacing:-.5px}
  .stat:nth-child(3) b{color:var(--good)}
  .stat:nth-child(4) b{color:var(--accent)}
  .stat span{font-size:11px;color:var(--muted)}
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px}
  .progress{width:100%;height:8px;background:var(--card2);border-radius:8px;overflow:hidden}
  .progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:.3s;border-radius:8px}
  .flip{width:100%;cursor:pointer;perspective:1400px}
  .flash{position:relative;width:100%;min-height:240px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,.18,.2,1)}
  .flip.flipped .flash{transform:rotateY(180deg)}
  .face{
    border-radius:22px;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;padding:30px 22px;text-align:center;min-height:240px;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
  }
  .face.front{position:relative}
  .face.back{position:absolute;inset:0;transform:rotateY(180deg)}
  .flash .it-word{font-size:40px;font-weight:800;line-height:1.12;letter-spacing:-.5px;text-rendering:optimizeLegibility}
  .flash .small{font-size:15px;color:var(--muted)}
  .flash .ipa-note{font-size:16px;color:var(--accent2);font-style:italic}
  .flash .en-trans{font-size:27px;font-weight:700}
  .flash .hint{position:absolute;bottom:16px;font-size:12px;color:var(--muted)}
  .speak{
    position:absolute;top:14px;right:14px;background:var(--card2);border:1px solid var(--line);
    color:var(--text);width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;transition:.12s;
  }
  .speak:hover{background:#e2e8f4}
  .row{display:flex;gap:12px;width:100%}
  .btn{
    flex:1;padding:15px;border-radius:14px;border:1px solid var(--line);background:var(--card);
    color:var(--text);font-size:15px;font-weight:700;cursor:pointer;transition:.12s;box-shadow:var(--shadow-sm);
  }
  .btn:hover{background:var(--card2)}
  .btn:active{transform:scale(.97)}
  .btn.good{background:rgba(22,163,74,.10);border-color:var(--good);color:var(--good)}
  .btn.good:hover{background:rgba(22,163,74,.16)}
  .btn.bad{background:rgba(220,38,38,.08);border-color:var(--bad);color:var(--bad)}
  .btn.bad:hover{background:rgba(220,38,38,.14)}
  .btn.primary{background:linear-gradient(90deg,var(--accent),#f0526a);border-color:transparent;color:#fff;box-shadow:0 6px 16px rgba(226,56,75,.28)}
  .btn.primary:hover{filter:brightness(1.04)}
  .options{display:flex;flex-direction:column;gap:10px;width:100%}
  .opt{
    padding:16px;border-radius:14px;border:1px solid var(--line);background:var(--card);
    color:var(--text);font-size:18px;font-weight:600;cursor:pointer;text-align:center;transition:.12s;box-shadow:var(--shadow-sm);
  }
  .opt:hover{border-color:var(--accent2);background:#f3f7ff}
  .opt.correct{background:rgba(22,163,74,.12);border-color:var(--good);color:var(--good)}
  .opt.wrong{background:rgba(220,38,38,.10);border-color:var(--bad);color:var(--bad)}
  .opt:disabled{cursor:default}
  .qsub{font-size:14px;color:var(--muted);text-align:center;margin-top:-8px}
  .done{text-align:center;padding:40px 16px}
  .done .big{font-size:60px}
  .done h2{margin:10px 0;font-weight:800}
  .muted{color:var(--muted);font-size:13px;text-align:center;line-height:1.6}
  .pill{display:inline-block;background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--muted);margin:2px}
  .hidden{display:none!important}
  .gram-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;width:100%;margin-bottom:14px;box-shadow:var(--shadow-sm)}
  .gram-card h3{margin:0 0 4px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
  .gram-card h4{margin:0 0 8px;font-size:17px;color:var(--accent);font-weight:700}
  .gram-card p{margin:0;font-size:14.5px;line-height:1.6;color:var(--text)}
  .gram-chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;width:100%;-webkit-overflow-scrolling:touch}
  .gram-chips::-webkit-scrollbar{height:0}
  .gram-chip{flex:0 0 auto;background:var(--card);border:1px solid var(--line);color:var(--muted);
    border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.12s;box-shadow:var(--shadow-sm)}
  .gram-chip:hover{border-color:var(--accent2);color:var(--accent2)}
  .gram-chip.active{background:var(--accent2);border-color:var(--accent2);color:#fff}
  .tile.wide{grid-column:1/-1;flex-direction:row;align-items:center;min-height:auto;gap:16px;background:linear-gradient(120deg,#fff 0%,#fbf3f4 100%)}
  .tile.wide .ico{font-size:30px;width:58px;height:58px;background:rgba(226,56,75,.10)}
  .tile.wide .txt{display:flex;flex-direction:column;gap:6px}
  .ref-nav{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;width:100%;-webkit-overflow-scrolling:touch}
  .ref-nav::-webkit-scrollbar{height:0}
  .ref-chip{flex:0 0 auto;background:var(--card);border:1px solid var(--line);color:var(--muted);
    border-radius:20px;padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.12s;box-shadow:var(--shadow-sm)}
  .ref-chip:hover{border-color:var(--accent);color:var(--accent)}
  .ref-chip.active{border-color:var(--accent);color:#fff;background:var(--accent)}
  .ref-sec{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;width:100%;margin-bottom:16px;scroll-margin-top:78px;box-shadow:var(--shadow-sm)}
  .ref-sec .head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .ref-sec .head .ico{font-size:22px;line-height:1;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:var(--card2);border-radius:12px;flex:0 0 auto}
  .ref-sec h3{margin:0;font-size:18px;color:var(--text);font-weight:800;letter-spacing:-.2px}
  .ref-sec .sub{font-size:12.5px;color:var(--muted);margin:0 0 16px}
  .ref-sec p.txt{font-size:14px;line-height:1.65;margin:0 0 14px}
  .ref-note{background:#eef3ff;border-left:3px solid var(--accent2);border-radius:10px;padding:11px 14px;font-size:13.5px;line-height:1.55;color:var(--text);margin:0 0 12px}
  .ref-note b{color:var(--text);font-weight:700}
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 0 14px;border-radius:14px;border:1px solid var(--line)}
  table.ref{border-collapse:collapse;width:100%;font-size:14px;min-width:max-content;background:var(--card)}
  table.ref th,table.ref td{padding:10px 13px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  table.ref thead th{background:var(--card2);color:var(--muted);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0}
  table.ref tbody tr:nth-child(even) td{background:#fafbfe}
  table.ref tbody tr:last-child td{border-bottom:none}
  table.ref tbody td:first-child{color:var(--muted);font-weight:600}
  table.ref td.it-tap{color:var(--text);font-weight:700;cursor:pointer}
  table.ref td.it-tap:hover{color:var(--accent2)}
  table.ref td.it-tap:active{color:var(--accent)}
  .idiom{padding:13px 0;border-bottom:1px solid var(--line)}
  .idiom:last-child{border-bottom:none;padding-bottom:0}
  .idiom:first-of-type{padding-top:2px}
  .idiom-it{font-size:16px;font-weight:800;color:var(--text);cursor:pointer;letter-spacing:-.2px;display:inline-block}
  .idiom-it .spk{font-size:13px;opacity:.45;transition:.15s}
  .idiom-it:hover{color:var(--accent2)}
  .idiom-it:hover .spk{opacity:1}
  .idiom-it:active{color:var(--accent)}
  .idiom-sig{font-size:14px;color:var(--text);line-height:1.5;margin-top:4px}
  .idiom-lett{font-size:12.5px;color:var(--muted);font-style:italic;margin-top:3px}
  .idiom-ex{font-size:13.5px;color:var(--muted);line-height:1.5;margin-top:7px;padding-left:11px;border-left:2px solid var(--line);cursor:pointer;transition:.15s}
  .idiom-ex:hover{color:var(--accent2);border-left-color:var(--accent2)}
  .pop-lingua{font-size:13px;color:var(--text);line-height:1.5;margin-top:8px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:9px 11px}
  .q{font-size:32px;font-weight:800;text-align:center;margin:6px 0;letter-spacing:-.5px;text-rendering:optimizeLegibility}
  @keyframes shake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.05)}100%{transform:scale(1)}}
  .opt.correct,.btn.good.chosen{animation:pop .35s ease}
  .opt.wrong,.btn.bad.chosen{animation:shake .4s ease}
  .prog-wrap{display:flex;align-items:center;gap:10px;width:100%}
  .prog-wrap .progress{flex:1}
  .prog-num{font-size:12px;font-weight:700;color:var(--muted);min-width:46px;text-align:right;font-variant-numeric:tabular-nums}
  .done .ring{position:relative;width:124px;height:124px;border-radius:50%;margin:0 auto 4px;
    display:flex;align-items:center;justify-content:center;animation:ring-in .55s cubic-bezier(.2,.7,.3,1) both}
  .done .ring::before{content:"";position:absolute;width:94px;height:94px;border-radius:50%;background:var(--card)}
  .done .ring span{position:relative;font-size:27px;font-weight:800;color:var(--col)}
  .done .big{animation:ring-in .5s cubic-bezier(.2,.7,.3,1) both}
  @keyframes ring-in{from{transform:scale(.6) rotate(-12deg);opacity:0}to{transform:none;opacity:1}}
  .sk{position:relative;overflow:hidden;background:var(--card2);border:1px solid var(--line)}
  .stat.sk{height:66px}
  .tile.sk{min-height:128px}
  .sk::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);animation:shimmer 1.2s infinite}
  @keyframes shimmer{to{transform:translateX(100%)}}
  .errbox{text-align:center;padding:48px 20px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .errbox .big{font-size:52px}
  .errbox small{color:var(--muted);font-size:11px;word-break:break-word;opacity:.7}
  #splash{
    position:fixed;inset:0;z-index:9999;background:#fff;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;transition:opacity .4s ease;
  }
  #splash img{width:100%;height:100%;object-fit:cover;}
  #splash.fade-out{opacity:0;pointer-events:none}
  @media (prefers-color-scheme: dark){
    #splash{background:#0d1220}
  }
  .vocab-input{width:100%;padding:14px 16px 14px 46px;border-radius:14px;border:1.5px solid var(--line);background:var(--card);color:var(--text);font-size:17px;outline:none;box-shadow:var(--shadow-sm);transition:.15s;-webkit-appearance:none;appearance:none}
  .vocab-input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(47,107,237,.12)}
  .vocab-input::placeholder{color:var(--muted)}
  .vocab-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;width:100%;display:flex;flex-direction:column;gap:10px;box-shadow:var(--shadow-sm);animation:rise .18s ease both}
  .vocab-it{font-size:26px;font-weight:800;letter-spacing:-.4px;line-height:1.2}
  .vocab-en{font-size:14.5px;color:var(--muted);line-height:1.55;margin-top:4px}
  .vocab-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .vocab-speak{background:var(--card2);border:1px solid var(--line);border-radius:50%;width:38px;height:38px;flex-shrink:0;font-size:17px;cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center}
  .vocab-speak:hover{background:var(--line)}
  .reg-pill{padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
  .reg-pill.formal{background:rgba(47,107,237,.12);color:var(--accent2)}
  .reg-pill.neutral{background:var(--card2);color:var(--muted);border:1px solid var(--line)}
  .reg-pill.informal{background:rgba(226,56,75,.10);color:var(--accent)}
  .add-flash-btn{margin-top:10px;width:100%;padding:9px;border-radius:10px;border:1px solid var(--line);background:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:.12s}
  .add-flash-btn:not(:disabled):hover{border-color:var(--accent2);color:var(--accent2)}
  .add-flash-btn:disabled{cursor:default;opacity:.8}
  .vocab-star-btn{background:none;border:1px solid var(--line);border-radius:50%;width:38px;height:38px;flex-shrink:0;font-size:18px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;color:var(--muted);line-height:1}
  .vocab-star-btn:hover{border-color:#f59e0b;color:#f59e0b}
  .vocab-star-btn.starred{color:#f59e0b;border-color:#f59e0b;background:rgba(245,158,11,.10)}
  .flash .flash-star-btn{position:absolute;bottom:14px;left:14px;background:none;border:1px solid var(--line);border-radius:50%;width:36px;height:36px;font-size:17px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;color:var(--muted);line-height:1;z-index:2}
  .flash .flash-star-btn:hover{border-color:#f59e0b;color:#f59e0b}
  .flash .flash-star-btn.starred{color:#f59e0b;border-color:#f59e0b;background:rgba(245,158,11,.10)}
  .tag-picker{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;display:flex;flex-direction:column;gap:8px}

const STORE_KEY = "italiano_srs_v1";
const USER_KEY  = "italiano_user_items";

function userStore(){ return JSON.parse(localStorage.getItem(USER_KEY)||'{"voci":[]}'); }

function addUserVoce(itWord, enTrans, pos, tag){

function prefStore(){ try{ return new Set(JSON.parse(localStorage.getItem(PREF_KEY)||'[]')); }catch(e){ return new Set(); } }
function savePrefStore(s){ localStorage.setItem(PREF_KEY, JSON.stringify([...s])); }
function isPref(id){ return prefStore().has(id); }
function togglePref(id){ const s=prefStore(); if(s.has(id)) s.delete(id); else s.add(id); savePrefStore(s); return s.has(id); }

const shuffle = a => a.map(x=>[Math.random(),x]).sort((m,n)=>m[0]-n[0]).map(p=>p[1]);
const sample = (a,n)=>shuffle(a).slice(0,n);
function haptic(ok){ try{ navigator.vibrate && navigator.vibrate(ok?18:[0,35,30,35]); }catch(e){} }

let itVoice = null, enVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  itVoice = vs.find(v=>/it[-_]?IT/i.test(v.lang)) || vs.find(v=>/^it/i.test(v.lang)) || null;
  enVoice = vs.find(v=>/en[-_]?(US|GB)/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function speak(text, lang="it"){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if(lang==="it"){ u.lang="it-IT"; if(itVoice) u.voice=itVoice; }
  else { u.lang="en-US"; if(enVoice) u.voice=enVoice; }
  u.rate=.9; speechSynthesis.speak(u);
}

const SOFIA_MEM = "sofia_last_session";

// --- Ripetizione dilazionata a intervalli crescenti (tempo reale) ---
// Quando dici di sapere una carta ("Got it"), sparisce per un giorno. Se il
// giorno dopo torna e la sai ancora, sparisce per una settimana, poi due, e
// così via (ogni livello raddoppia). Se sbagli ("Review again") riparte da zero.
// Stesso meccanismo in TUTTE le sezioni; il "Reset sezione" lo azzera.
const DAY_MS = 86400000;
const SRS_INTERVALS = [1, 7, 14, 28, 56, 112, 224]; // giorni di attesa per box 1,2,3,…
function box(id){ return (srs[id] && srs[id].box) || 0; }
// Una carta è "in scadenza" (da ripassare ora) se mai vista o se l'intervallo è scaduto.
function isDue(id){ const s = srs[id]; return !s || !s.due || Date.now() >= s.due; }
// Quanto è in ritardo (più alto = più urgente). Le mai viste hanno priorità massima.
function dueScore(id){
  const s = srs[id];
  if(!s || !s.due) return Number.MAX_SAFE_INTEGER;
  return Date.now() - s.due;
}
function grade(id, ok){
  const s = srs[id] || {box:0, seen:0, correct:0};
  if(ok){
    s.box = (s.box||0) + 1;
    const days = SRS_INTERVALS[Math.min(s.box-1, SRS_INTERVALS.length-1)];
    s.due = Date.now() + days*DAY_MS;
  } else {
    s.box = 0;
    s.due = Date.now();           // torna subito in coda nella sessione
  }
  s.seen++; if(ok) s.correct++;
  s.last = Date.now();
  srs[id]=s; saveSrs();
}
// "Reset sezione": dimentica la pianificazione di queste carte → tornano da studiare.
function resetSrsFor(ids){
  ids.forEach(id=>{ delete srs[id]; });
  saveSrs();
}

// Studio per argomento: mostra solo le carte in scadenza; il "Reset sezione"
// azzera la pianificazione di tutte le carte di questa sezione.
function startTopicFlash(pool, label){
  const ids = pool.map(c=>c.id);
  runFlash(pool, label, {
    restart: ()=>startTopicFlash(pool, label),
    onReset: ()=>{ resetSrsFor(ids); startTopicFlash(pool, label); }
  });
}

function startQuick15(pool, label){
  runFlash(pool, label + ' · 15 carte', { limit: 15, restart: ()=>startQuick15(pool, label) });
}

// --- Daily review streak ---
const DAILY_KEY = "italiano_daily_v1";
function dateStr(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function todayStr(){ return dateStr(new Date()); }
function yesterdayStr(){ const d=new Date(); d.setDate(d.getDate()-1); return dateStr(d); }
function dailyState(){ try{ return JSON.parse(localStorage.getItem(DAILY_KEY)||"{}"); }catch(e){ return {}; } }
function dailyStreak(){
  const s=dailyState();
  if(!s.last) return 0;
  // streak counts only if the last completed session was today or yesterday
  return (s.last===todayStr()||s.last===yesterdayStr()) ? (s.streak||0) : 0;
}
function recordDailyDone(){
  const s=dailyState(), t=todayStr();
  if(s.last===t) return;                 // already counted today
  s.streak = (s.last===yesterdayStr()) ? (s.streak||0)+1 : 1;
  s.last=t;
  localStorage.setItem(DAILY_KEY, JSON.stringify(s));
}
// Tutte le carte attualmente in scadenza (mai viste o con intervallo scaduto).
function dailyPool(){
  return [...(DB.dizionario||[]), ...(userStore().voci||[])]
    .filter(x=>isDue(x.id));

const DAILY_SIZE = 20;

// --- Conjugation practice ---
const CONJ_TENSES = [
  {key:"indic.pres",      label:"Presente",               modo:"Indicativo"},
  {key:"indic.passpross", label:"Passato prossimo",       modo:"Indicativo",   comp:"indic.pres"},
  {key:"indic.imperf",    label:"Imperfetto",             modo:"Indicativo"},
  {key:"indic.trappross", label:"Trapassato prossimo",    modo:"Indicativo",   comp:"indic.imperf"},
  {key:"indic.passrem",   label:"Passato remoto",         modo:"Indicativo"},
  {key:"indic.trapprem",  label:"Trapassato remoto",      modo:"Indicativo",   comp:"indic.passrem"},
  {key:"indic.futuro",    label:"Futuro semplice",        modo:"Indicativo"},
  {key:"indic.futant",    label:"Futuro anteriore",       modo:"Indicativo",   comp:"indic.futuro"},
  {key:"cong.pres",       label:"Congiuntivo presente",   modo:"Congiuntivo"},
  {key:"cong.passato",    label:"Congiuntivo passato",    modo:"Congiuntivo",  comp:"cong.pres"},
  {key:"cong.imperf",     label:"Congiuntivo imperfetto", modo:"Congiuntivo"},
  {key:"cong.trap",       label:"Congiuntivo trapassato", modo:"Congiuntivo",  comp:"cong.imperf"},
  {key:"cond.pres",       label:"Condizionale presente",  modo:"Condizionale"},
  {key:"cond.passato",    label:"Condizionale passato",   modo:"Condizionale", comp:"cond.pres"},
  {key:"imperativo",      label:"Imperativo",             modo:"Imperativo"}
];
const CONJ_PRONOUNS = ["io","tu","lui/lei","noi","voi","loro"];
const IMPER_PRONOUNS = ["\u2014","tu","Lei","noi","voi","loro"];
const tenseLabel = k => (CONJ_TENSES.find(t=>t.key===k)||{}).label || k;
const conjPronoun = (tk,p) => tk==="imperativo" ? IMPER_PRONOUNS[p] : CONJ_PRONOUNS[p];
function normConj(s){ return (s||"").toLowerCase().trim().replace(/\s+/g," "); }
function stripAcc(s){ return s.normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

// Returns {display, accept:[...]} for verb v, tense tk, person p \u2014 or null if that cell has no form.
// Compound tenses are built on the fly from the auxiliary (essere/avere) + participio passato.
function conjForm(v, tk, p){
  const t = CONJ_TENSES.find(x=>x.key===tk);
  if(t && t.comp){
    if(!v.pp) return null;
    const auxName = v.aux || "avere";
    const auxV = (DB.verbi||[]).find(x=>x.inf===auxName);
    const auxForms = auxV && auxV.coniugazioni[t.comp];
    if(!auxForms) return null;
    const a = auxForms[p];
    if(!a) return null;
    if(auxName==="essere"){
      const part  = p<3 ? v.pp : v.pp.replace(/o$/,"i");   // accordo maschile
      const partF = p<3 ? v.pp.replace(/o$/,"a") : v.pp.replace(/o$/,"e"); // femminile
      return {display:`${a} ${part}`, accept:[`${a} ${part}`, `${a} ${partF}`]};
    }
    return {display:`${a} ${v.pp}`, accept:[`${a} ${v.pp}`]};
  }
  const forms = (v.coniugazioni||{})[tk];
  if(!forms) return null;
  const f = forms[p];
  if(!f) return null;
  return {display:f, accept:[f]};
}

async function forceUpdate(btnEl){
  if(btnEl){btnEl.textContent="⏳ Updating...";btnEl.disabled=true;}
  try{
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
  }catch(e){}
  // Query unica: bypassa la cache HTTP del browser E la CDN di GitHub Pages
  // (location.reload(true) è deprecato e ricaricava la pagina vecchia dalla cache HTTP)
  location.replace(location.pathname + "?fresh=" + Date.now());
}

function progressBar(stage){
  const wrap = $(`<div class="prog-wrap"><div class="progress"><i></i></div><span class="prog-num"></span></div>`);
  stage.appendChild(wrap);
  const fill = wrap.querySelector("i");
  const num = wrap.querySelector(".prog-num");
  fill.setNum = (i,n)=>{ num.textContent = `${Math.min(i+1,n)} / ${n}`; };
  return fill;
}

function start(mode){
  history.pushState({screen:mode}, "");
  if(mode==="daily") return runDaily();
  if(mode==="conj") return runConjugation();
  if(mode==="flash") return pickFlashTopic();
  if(mode==="memory") return runMemory();
  if(mode==="articoli") return runArticoli();
  if(mode==="phrase") return runPhrase();
  if(mode==="diz" || mode==="vocab") return runVocabolario();
  if(mode==="ref") return runReference();
  if(mode==="idiomi") return runIdioms();
  if(mode==="pop") return runPop();
  if(mode==="sofia") return runSofia();
}

const hasItalian = s => /[a-zÀ-ɏ]/i.test(s);

function runReference(){
  const stage = header();
  const secs = DB.riferimento || [];
  const nav = $(`<div class="ref-nav"></div>`);
  secs.forEach(s=>{
    const chip = $(`<button class="ref-chip">${s.icona||""} ${s.categoria}</button>`);
    chip.onclick = ()=>document.getElementById("sec-"+s.id).scrollIntoView({behavior:"smooth",block:"start"});
    nav.appendChild(chip);
  });
  stage.appendChild(nav);
  secs.forEach(s=>{
    const sec = $(`<section class="ref-sec" id="sec-${s.id}"></section>`);
    sec.appendChild($(`
      <div class="head">
        <span class="ico">${s.icona||"&#128204;"}</span>
        <h3>${s.categoria}</h3>
      </div>`));
    if(s.sottotitolo) sec.appendChild($(`<p class="sub">${s.sottotitolo}</p>`));
    (s.blocchi||[]).forEach(b=>{
      if(b.tipo==="testo"){
        sec.appendChild($(`<p class="txt">${b.testo}</p>`));
      } else if(b.tipo==="nota"){
        sec.appendChild($(`<div class="ref-note">&#128161; ${b.testo}</div>`));
      } else if(b.tipo==="tabella"){
        const wrap = $(`<div class="tbl-wrap"></div>`);
        const t = $(`<table class="ref"></table>`);
        const thead = $(`<thead></thead>`);
        const trh = $(`<tr></tr>`);
        b.intestazioni.forEach(h=>trh.appendChild($(`<th>${h}</th>`)));
        thead.appendChild(trh); t.appendChild(thead);
        const tbody = $(`<tbody></tbody>`);
        b.righe.forEach(r=>{
          const tr = $(`<tr></tr>`);
          r.forEach((cell,ci)=>{
            const tappable = ci>0 && hasItalian(cell) && cell.length>1 && !/^\d+$/.test(cell);
            const td = $(`<td class="${tappable?'it-tap':''}">${cell}</td>`);
            if(tappable) td.onclick=()=>speak(cell.replace(/<[^>]+>/g,''));
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        t.appendChild(tbody); wrap.appendChild(t); sec.appendChild(wrap);
      }
    });
    stage.appendChild(sec);
  });
  const home = $(`<button class="btn" style="margin-top:4px">&#8593; Back to top</button>`);
  home.onclick = ()=>stage.scrollIntoView({behavior:"smooth",block:"start"});
  stage.appendChild(home);
}

// Pop — cultura italiana contemporanea (curiosità, meme, slang, regionalismi)
// con focus linguistico. Le categorie sono organizzate in sezioni separate
// (tab): se ne vede una alla volta. La ricerca, se attiva, cerca in tutte.
function runPop(){
  const stage = header();
  const cats = DB.pop || [];
  stage.appendChild($(`<div style="margin-bottom:4px"><b style="font-size:18px">&#10024; Pop</b></div>`));
  stage.appendChild($(`<p class="muted" style="margin:0 0 14px">Cultura italiana di oggi spiegata dal punto di vista della lingua. Tocca un titolo o un esempio per ascoltarne la pronuncia &#128266;</p>`));

  // Search box
  const search = $(`<input type="text" placeholder="Cerca un meme, una parola, una curiosità…" style="width:100%;box-sizing:border-box;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);margin-bottom:14px">`);
  stage.appendChild(search);

  // Category tabs — una sezione alla volta
  let activeId = cats.length ? cats[0].id : null;
  const nav = $(`<div class="ref-nav"></div>`);
  const chips = {};
  function setActiveChip(id){
    cats.forEach(c=>{
      const on = c.id===id && !search.value.trim();
      chips[c.id].classList.toggle("active", on);
    });
  }
  cats.forEach(c=>{
    const chip = $(`<button class="ref-chip">${c.icona||""} ${c.categoria}</button>`);
    chip.onclick = ()=>{ activeId = c.id; search.value=""; render(""); };
    chips[c.id] = chip;
    nav.appendChild(chip);
  });
  stage.appendChild(nav);

  const secWrap = $(`<div></div>`);
  stage.appendChild(secWrap);

  function sectionFor(c, matches){
    const sec = $(`<section class="ref-sec" id="pop-${c.id}"></section>`);
    sec.appendChild($(`
      <div class="head">
        <span class="ico">${c.icona||"&#10024;"}</span>
        <h3>${c.categoria}</h3>
      </div>`));
    if(c.sottotitolo) sec.appendChild($(`<p class="sub">${c.sottotitolo}</p>`));
    matches.forEach(v=>{
      const card = $(`<div class="idiom"></div>`);
      const head = $(`<div class="idiom-it it-tap">${v.titolo} <span class="spk">&#128266;</span></div>`);
      head.onclick = ()=>speak(v.titolo.replace(/[“”"]/g,''));
      card.appendChild(head);
      if(v.spiega) card.appendChild($(`<div class="idiom-sig">${v.spiega}</div>`));
      if(v.lingua) card.appendChild($(`<div class="pop-lingua">&#128172; ${v.lingua}</div>`));
      if(v.esempio){
        const ex = $(`<div class="idiom-ex it-tap">&#8220;${v.esempio}&#8221;</div>`);
        ex.onclick = ()=>speak(v.esempio);
        card.appendChild(ex);
      }
      sec.appendChild(card);
    });
    return sec;
  }

  function render(query){
    const q = (query||"").trim().toLowerCase();
    secWrap.innerHTML = "";
    setActiveChip(activeId);
    if(q){
      // Ricerca globale su tutte le categorie
      let shown = 0;
      cats.forEach(c=>{
        const matches = (c.voci||[]).filter(v=>
          [v.titolo, v.spiega, v.lingua, v.esempio].some(x=>x && x.toLowerCase().includes(q)));
        if(!matches.length) return;
        shown += matches.length;
        secWrap.appendChild(sectionFor(c, matches));
      });
      if(!shown) secWrap.appendChild($(`<p class="muted" style="text-align:center;padding:30px 0">Nessun risultato per &ldquo;${q}&rdquo;.</p>`));
    } else {
      // Solo la categoria attiva
      const c = cats.find(x=>x.id===activeId) || cats[0];
      if(c) secWrap.appendChild(sectionFor(c, c.voci||[]));
    }
  }

  let t;
  search.addEventListener("input", ()=>{ clearTimeout(t); t=setTimeout(()=>render(search.value), 120); });
  render("");

  const home = $(`<button class="btn" style="margin-top:4px">&#8593; Torna su</button>`);
  home.onclick = ()=>stage.scrollIntoView({behavior:"smooth",block:"start"});
  stage.appendChild(home);
}

function runIdioms(){
  const stage = header();
  const cats = DB.modididire || [];
  stage.appendChild($(`<div style="margin-bottom:4px"><b style="font-size:18px">Modi di dire &amp; Slang</b></div>`));
  stage.appendChild($(`<p class="muted" style="margin:0 0 14px">Tocca un'espressione o un esempio per ascoltarne la pronuncia &#128266;</p>`));

  // Flashcard practice launcher
  const nEspr = cats.reduce((n,c)=>n+(c.espressioni||[]).length,0);
  if(nEspr){
    const study = $(`<button class="tile wide" style="margin-bottom:14px">
      <div class="ico">🎴</div>
      <div class="txt">
        <div class="t">Allenati con le flashcard</div>
        <div class="d">${nEspr} espressioni &middot; indovina il significato e mettiti alla prova</div>
      </div>
    </button>`);
    study.onclick = ()=>runIdiomFlash(cats);
    stage.appendChild(study);
  }

  // Search box
  const search = $(`<input type="text" placeholder="Cerca un'espressione o un significato…" style="width:100%;box-sizing:border-box;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);margin-bottom:14px">`);
  stage.appendChild(search);

  // Category nav
  const nav = $(`<div class="ref-nav"></div>`);
  cats.forEach(c=>{
    const chip = $(`<button class="ref-chip">${c.icona||""} ${c.categoria}</button>`);
    chip.onclick = ()=>document.getElementById("idi-"+c.id).scrollIntoView({behavior:"smooth",block:"start"});
    nav.appendChild(chip);
  });
  stage.appendChild(nav);

  const secWrap = $(`<div></div>`);
  stage.appendChild(secWrap);

  function render(query){
    const q = (query||"").trim().toLowerCase();
    secWrap.innerHTML = "";
    let shown = 0;
    cats.forEach(c=>{
      const matches = (c.espressioni||[]).filter(e=>{
        if(!q) return true;
        return [e.it, e.sig, e.lett, e.esempio].some(v=>v && v.toLowerCase().includes(q));
      });
      if(!matches.length) return;
      shown += matches.length;
      const sec = $(`<section class="ref-sec" id="idi-${c.id}"></section>`);
      sec.appendChild($(`
        <div class="head">
          <span class="ico">${c.icona||"&#129305;"}</span>
          <h3>${c.categoria}</h3>
        </div>`));
      if(c.sottotitolo) sec.appendChild($(`<p class="sub">${c.sottotitolo}</p>`));
      matches.forEach(e=>{
        const card = $(`<div class="idiom"></div>`);
        const head = $(`<div class="idiom-it it-tap">${e.it} <span class="spk">&#128266;</span></div>`);
        head.onclick = ()=>speak(e.it);
        card.appendChild(head);
        card.appendChild($(`<div class="idiom-sig">${e.sig}</div>`));
        if(e.lett) card.appendChild($(`<div class="idiom-lett">alla lettera: &ldquo;${e.lett}&rdquo;</div>`));
        if(e.esempio){
          const ex = $(`<div class="idiom-ex it-tap">&#8220;${e.esempio}&#8221;</div>`);
          ex.onclick = ()=>speak(e.esempio);
          card.appendChild(ex);
        }
        sec.appendChild(card);
      });
      secWrap.appendChild(sec);
    });
    if(!shown){
      secWrap.appendChild($(`<p class="muted" style="text-align:center;padding:30px 0">Nessuna espressione trovata per &ldquo;${q}&rdquo;.</p>`));
    }
  }

  let t;
  search.addEventListener("input", ()=>{ clearTimeout(t); t=setTimeout(()=>render(search.value), 120); });
  render("");

  const home = $(`<button class="btn" style="margin-top:4px">&#8593; Torna su</button>`);
  home.onclick = ()=>stage.scrollIntoView({behavior:"smooth",block:"start"});
  stage.appendChild(home);
}

// Flashcard-style exercise for idioms: read the Italian expression, recall its
// meaning, flip to check, then self-grade. Idioms have no SRS ids, so progress
// is session-only (score for the final ring).
function runIdiomFlash(cats){
  cats = cats || DB.modididire || [];
  const pool = [];
  cats.forEach(c=>(c.espressioni||[]).forEach(e=>pool.push(e)));
  const deck = pool.slice().sort(()=>Math.random()-.5).slice(0, Math.min(15, pool.length));
  let i=0, correct=0;
  const stage = header();
  if(!deck.length){
    stage.appendChild($(`<p class="muted" style="text-align:center;padding:30px">Nessuna espressione disponibile.</p>`));
    return;
  }
  stage.appendChild($(`<div style="text-align:center;margin-bottom:4px;font-size:13px;color:var(--muted)">Modi di dire &amp; Slang</div>`));

  const bar = progressBar(stage);
  const cardWrap = $(`<div style="width:100%"></div>`); stage.appendChild(cardWrap);

  function show(){
    if(i>=deck.length){
      return finish(stage, `${correct} / ${deck.length} sapute`, ()=>runIdiomFlash(cats));
    }
    bar.style.width = (i/deck.length*100)+"%"; bar.setNum(i, deck.length);
    const e = deck[i]; let flipped=false;
    cardWrap.innerHTML="";
    const flip = $(`
      <div class="flip">
        <div class="flash">
          <div class="face front">
            <button class="speak" title="Ascolta">&#128266;</button>
            <div class="it-word" style="font-size:27px;line-height:1.2">${e.it}</div>
            <div class="hint">tocca per il significato</div>
          </div>
          <div class="face back">
            <div class="en-trans" style="font-size:20px;font-weight:700">${e.sig}</div>
            ${e.lett ? `<div class="ipa-note" style="margin-top:8px">alla lettera: &ldquo;${e.lett}&rdquo;</div>` : ""}
            ${e.esempio ? `<div class="small" style="margin-top:10px;font-style:italic">&ldquo;${e.esempio}&rdquo;</div>` : ""}
          </div>
        </div>
      </div>`);
    flip.querySelector(".speak").onclick = (ev)=>{ev.stopPropagation(); speak(e.it);};
    flip.onclick = ()=>{
      if(flipped) return;
      flipped=true;
      flip.classList.add("flipped");
      controls.classList.remove("hidden");
      if(e.esempio && 'speechSynthesis' in window) setTimeout(()=>speak(e.esempio), 250);
    };
    cardWrap.appendChild(flip);
    const controls = $(`
      <div class="row hidden" style="margin-top:14px">
        <button class="btn bad">Da rivedere</button>
        <button class="btn good">Sapevo!</button>
      </div>`);
    controls.children[0].onclick=()=>{haptic(false); i++; show();};
    controls.children[1].onclick=()=>{haptic(true); correct++; i++; show();};
    cardWrap.appendChild(controls);
    if('speechSynthesis' in window) setTimeout(()=>speak(e.it), 150);
  }
  show();
}

function pickFlashTopic(){
  const stage = header();
  stage.appendChild($(`<div style="margin-bottom:14px"><b style="font-size:18px">Scegli argomento</b></div>`));

  const allPool = [...(DB.dizionario||[]), ...(userStore().voci||[])];
  const dueOf = pool => pool.filter(x=>isDue(x.id)).length;

  // Avvolge il tile in un flex-row e aggiunge "⚡ 15 carte" quando il pool ha >15 parole
  function mkRow(btn, pool, label){
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;gap:8px;align-items:stretch';
    btn.style.flex = '1';
    wrap.appendChild(btn);
    if(pool.length > 15){
      const q = $(`<button title="Ripassa 15 carte (prima quelle in scadenza)" style="flex-shrink:0;padding:0 15px;border:1px solid var(--line);background:var(--card);border-radius:var(--radius);cursor:pointer;font-size:12px;font-weight:700;color:var(--accent2);text-align:center;line-height:1.5;white-space:nowrap;box-shadow:var(--shadow-sm);transition:.12s">&#9889;<br>15<br>carte</button>`);
      q.onmouseenter=()=>{q.style.borderColor='var(--accent2)';q.style.background='rgba(47,107,237,.07)';};
      q.onmouseleave=()=>{q.style.borderColor='';q.style.background='';};
      q.onclick=()=>startQuick15(pool, label);
      wrap.appendChild(q);
    }
    return wrap;
  }

  // ----- Preferite -----
  const prefIds = prefStore();
  const prefPool = allPool.filter(v=>prefIds.has(v.id));
  if(prefPool.length > 0){
    stage.appendChild($(`<div style="margin-bottom:10px"><b style="font-size:18px">&#11088; Preferite</b></div>`));
    const prefDue = dueOf(prefPool);
    const prefBtn = $(`<button class="tile wide" style="background:linear-gradient(120deg,var(--card) 0%,rgba(245,158,11,.07) 100%)">
      <div class="ico" style="font-size:28px;background:rgba(245,158,11,.12)">&#9733;</div>
      <div class="txt">
        <div class="t">Le mie preferite</div>
        <div class="d">${prefPool.length} parol${prefPool.length===1?'a':'e'} selezionat${prefPool.length===1?'a':'e'} &middot; <span style="color:var(--accent2)">${prefDue} da ripassare</span></div>
      </div>
    </button>`);
    prefBtn.onclick = ()=>startTopicFlash(prefPool, 'Le mie preferite');
    const prefRow = mkRow(prefBtn, prefPool, 'Le mie preferite');
    prefRow.style.marginBottom = '18px';
    stage.appendChild(prefRow);
  }

  // ----- Tutti -----
  const allDue = dueOf(allPool);
  const allBtn = $(`<button class="tile wide">
    <div class="ico">&#127922;</div>
    <div class="txt">
      <div class="t">Tutti gli argomenti</div>
      <div class="d">${allPool.length} elementi &middot; <span style="color:var(--accent2)">${allDue} da ripassare</span></div>
    </div>
  </button>`);
  allBtn.onclick = ()=>startTopicFlash(allPool, 'Tutti');
  const allRow = mkRow(allBtn, allPool, 'Tutti');
  allRow.style.marginBottom = '14px';
  stage.appendChild(allRow);

  // ----- Per argomento -----
  const list = $(`<div style="display:flex;flex-direction:column;gap:8px"></div>`);
  for(const [tag, label] of Object.entries(TOPIC_LABELS)){
    const words = (DB.dizionario||[]).filter(e=>e.tag&&e.tag.includes(tag));
    if(!words.length) continue;
    const due = words.filter(e=>isDue(e.id)).length;
    const icon = TOPIC_ICONS[tag]||'&#128218;';
    const btn = $(`<button class="tile wide">
      <div class="ico" style="font-size:24px">${icon}</div>
      <div class="txt">
        <div class="t">${label}</div>
        <div class="d">${words.length} parole &middot; <span style="color:var(--accent2)">${due} da ripassare</span></div>
      </div>
    </button>`);
    btn.onclick = ()=>runTopicList(words, label);
    list.appendChild(mkRow(btn, words, label));
  }
  stage.appendChild(list);
}

function runTopicList(pool, label){
  const stage = header();
  const POS_LABELS = {verb:'Verbo', noun:'Sost.', adjective:'Agg.', adverb:'Avv.', pronoun:'Pron.', other:'Altro'};
  const POS_COLORS = {verb:'rgba(47,107,237,.12)', noun:'rgba(22,163,74,.10)', adjective:'rgba(226,56,75,.10)', adverb:'rgba(255,165,0,.12)', other:'var(--card2)'};
  const POS_TC = {verb:'var(--accent2)', noun:'var(--good)', adjective:'var(--accent)', adverb:'#b45309', other:'var(--muted)'};

  const dueCount = pool.filter(x=>isDue(x.id)).length;

  const hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;align-items:baseline;gap:8px;margin-bottom:12px';
  const title = document.createElement('b');
  title.style.fontSize = '18px';
  title.textContent = label;
  const cnt = document.createElement('span');
  cnt.style.cssText = 'font-size:13px;color:var(--muted)';
  cnt.textContent = pool.length + ' parole';
  hdr.appendChild(title);
  hdr.appendChild(cnt);
  stage.appendChild(hdr);

  const studyBtn = $(`<button class="btn primary" style="width:100%;margin-bottom:12px">&#9654; Studia &middot; <span style="opacity:.85">${dueCount} da ripassare</span></button>`);
  studyBtn.onclick = ()=>startTopicFlash(pool, label);
  stage.appendChild(studyBtn);

  const inputWrap = $(`<div style="position:relative;width:100%;margin-bottom:10px"></div>`);
  inputWrap.appendChild($(`<span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none">&#128269;</span>`));
  const inp = document.createElement('input');
  inp.className = 'vocab-input';
  inp.type = 'search';
  inp.placeholder = 'Cerca parola…';
  inp.setAttribute('autocomplete','off');
  inp.setAttribute('autocorrect','off');
  inputWrap.appendChild(inp);
  stage.appendChild(inputWrap);

  const list = $(`<div style="display:flex;flex-direction:column;gap:8px;width:100%"></div>`);
  stage.appendChild(list);

  function render(q){
    list.innerHTML = '';
    const ql = q.toLowerCase();
    const filtered = q
      ? pool.filter(w=>w.it.toLowerCase().includes(ql)||(w.en||'').toLowerCase().includes(ql))
      : pool;
    if(!filtered.length){
      list.appendChild($(`<div style="text-align:center;padding:24px;color:var(--muted)">Nessun risultato</div>`));
      return;
    }
    filtered.slice(0,80).forEach(w=>{
      const card = document.createElement('div');
      card.style.cssText = 'background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm)';

      const textDiv = document.createElement('div');
      textDiv.style.flex = '1';
      const itEl = document.createElement('div');
      itEl.style.cssText = 'font-size:16px;font-weight:800;letter-spacing:-.3px';
      itEl.textContent = w.it;
      const enEl = document.createElement('div');
      enEl.style.cssText = 'font-size:12.5px;color:var(--muted);margin-top:1px';
      enEl.textContent = w.en;
      textDiv.appendChild(itEl);
      textDiv.appendChild(enEl);
      card.appendChild(textDiv);

      const b = box(w.id);
      if(b>=3){
        const dot = document.createElement('span');
        dot.textContent = '✓';
        dot.style.cssText = 'font-size:13px;font-weight:700;color:var(--good);flex-shrink:0';
        card.appendChild(dot);
      } else if(b>=1){
        const dot = document.createElement('span');
        dot.textContent = '●';
        dot.style.cssText = 'font-size:11px;color:var(--accent2);flex-shrink:0';
        card.appendChild(dot);
      }

      if(w.pos && POS_LABELS[w.pos]){
        const badge = document.createElement('span');
        badge.textContent = POS_LABELS[w.pos];
        badge.style.cssText = `font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;background:${POS_COLORS[w.pos]||'var(--card2)'};color:${POS_TC[w.pos]||'var(--muted)'}`;
        card.appendChild(badge);
      }

      const speakBtn = document.createElement('button');
      speakBtn.className = 'vocab-speak';
      speakBtn.innerHTML = '&#128266;';
      speakBtn.onclick = ()=>speak(w.it);
      card.appendChild(speakBtn);

      const starBtn = document.createElement('button');
      starBtn.className = 'vocab-star-btn' + (isPref(w.id) ? ' starred' : '');
      starBtn.title = isPref(w.id) ? 'Rimuovi dai preferiti' : 'Aggiungi ai preferiti';
      starBtn.innerHTML = '&#9733;';
      starBtn.onclick = ()=>{
        const on = togglePref(w.id);
        starBtn.classList.toggle('starred', on);
        starBtn.title = on ? 'Rimuovi dai preferiti' : 'Aggiungi ai preferiti';
      };
      card.appendChild(starBtn);

      list.appendChild(card);
    });
    if(filtered.length>80){
      list.appendChild($(`<div style="text-align:center;padding:10px;color:var(--muted);font-size:13px">+ altri ${filtered.length-80} — affina la ricerca</div>`));
    }
  }

  let debounce=null;
  inp.addEventListener('input',()=>{
    clearTimeout(debounce);
    debounce=setTimeout(()=>render(inp.value.trim()),100);
  });

  render('');
  setTimeout(()=>inp.focus(),80);
}

function runFlash(pool, topicLabel, opts){
  opts = opts || {};
  // Mostra solo le carte "in scadenza" (mai viste o con intervallo scaduto),
  // le più urgenti per prime. "Got it" pianifica la carta più avanti nel tempo
  // (1 giorno → 1 settimana → 2 → … ) e quindi sparisce dalla sessione; "Review
  // again" la riazzera e la rimette in fondo alla coda, così torna entro la sessione.
  let deck = (pool||[]).filter(c=>isDue(c.id)).sort((a,b)=>dueScore(b.id)-dueScore(a.id));
  if(opts.limit) deck = deck.slice(0, opts.limit);
  const total = deck.length;       // carte da padroneggiare in questa sessione
  let queue = deck.slice();        // coda di lavoro
  let mastered = 0;                // carte completate ("Got it") in questa sessione
  let dir = localStorage.getItem('flashDir')==='en-it' ? 'en-it' : 'it-en';
  const stage = header();
  if(topicLabel) stage.appendChild($(`<div style="text-align:center;margin-bottom:4px;font-size:13px;color:var(--muted)">${topicLabel}</div>`));

  // Tasto "Reset sezione": dimentica la pianificazione e rimette tutto da studiare.
  if(opts.onReset){
    const resetRow = $(`<div style="display:flex;justify-content:flex-end;margin-bottom:6px"></div>`);
    const resetBtn = $(`<button style="border:1px solid var(--line);background:var(--card);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--muted);cursor:pointer;transition:.15s">&#8635; Reset sezione</button>`);
    resetBtn.onclick = ()=>{ if(confirm("Azzerare la memoria delle flashcard di questa sezione? Tutte le carte torneranno da studiare.")) opts.onReset(); };
    resetRow.appendChild(resetBtn);
    stage.appendChild(resetRow);
  }

  // Nessuna carta in scadenza: tutto ripassato (con eventuale reset per rivederle subito).
  if(!total){
    stage.appendChild($(`
      <div class="done">
        <div class="big">&#9989;</div>
        <h2>Tutto ripassato!</h2>
        <p class="muted">Nessuna carta in scadenza qui per ora. Torna quando l'intervallo sarà scaduto.</p>
      </div>`));
    const row=$(`<div class="row"></div>`);
    const home=$(`<button class="btn">Home</button>`); home.onclick=()=>history.back();
    row.appendChild(home);
    if(opts.onReset){
      const rst=$(`<button class="btn primary">&#8635; Reset sezione</button>`);
      rst.onclick=()=>{ if(confirm("Azzerare la memoria delle flashcard di questa sezione? Tutte le carte torneranno da studiare.")) opts.onReset(); };
      row.appendChild(rst);
    }
    stage.appendChild(row);
    return;
  }

  const dirRow = $(`<div style="display:flex;gap:8px;justify-content:center;margin-bottom:10px"></div>`);
  const dirBtns = [['it-en','IT &#8594; EN'],['en-it','EN &#8594; IT']].map(([val,label])=>{
    const b = $(`<button style="border:1px solid var(--line);background:var(--card);border-radius:20px;padding:6px 16px;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;transition:.15s">${label}</button>`);
    b.onclick = ()=>{
      if(dir===val) return;
      dir = val;
      localStorage.setItem('flashDir', dir);
      paintDir();
      show();
    };
    dirRow.appendChild(b);
    return [val, b];
  });
  function paintDir(){
    dirBtns.forEach(([val,b])=>{
      const on = val===dir;
      b.style.background = on ? 'var(--accent2)' : 'var(--card)';
      b.style.color = on ? '#fff' : 'var(--muted)';
      b.style.borderColor = on ? 'var(--accent2)' : 'var(--line)';
    });
  }
  paintDir();
  stage.appendChild(dirRow);

  const bar = progressBar(stage);
  const cardWrap = $(`<div style="width:100%"></div>`); stage.appendChild(cardWrap);
  let c = null;
  // Prende la prossima carta dalla coda (o chiude la sessione). show() ridisegna
  // solo la carta corrente, così il cambio di direzione non la fa saltare.
  function advance(){
    if(!queue.length){
      if(opts.onComplete) opts.onComplete();
      return finish(stage, `Sessione completata! ${mastered} / ${total}`, opts.restart||pickFlashTopic);
    }
    c = queue.shift();
    show();
  }
  function show(){
    bar.style.width = (mastered/total*100)+"%"; bar.setNum(mastered, total);
    let flipped=false;
    const itFront = dir==='it-en';
    const frontWord = (itFront ? c.it : c.en) || "";
    const backTrans = (itFront ? c.en : c.it) || "";
    const ipaNote = c.ipa || "";
    const regTag = c.registro ? `<span class="pill">${c.registro}</span>` : "";
    cardWrap.innerHTML="";
    const starredNow = isPref(c.id);
    // In EN→IT la parola italiana è la risposta: il TTS sta sul retro per non svelarla
    const flip = $(`
      <div class="flip">
        <div class="flash">
          <div class="face front">
            ${itFront ? `<button class="speak" title="Listen">&#128266;</button>` : ""}
            <button class="flash-star-btn${starredNow?' starred':''}" title="Aggiungi ai preferiti">&#9733;</button>
            <div class="it-word">${frontWord}</div>
            ${itFront && ipaNote ? `<div class="ipa-note">${ipaNote}</div>` : ""}
            ${regTag}
            <div class="hint">tap to see translation</div>
          </div>
          <div class="face back">
            ${itFront ? "" : `<button class="speak" title="Listen">&#128266;</button>`}
            <button class="flash-star-btn${starredNow?' starred':''}" title="Aggiungi ai preferiti">&#9733;</button>
            <div class="en-trans">${backTrans}</div>
            ${!itFront && ipaNote ? `<div class="ipa-note">${ipaNote}</div>` : ""}
            <div class="small">${frontWord}${itFront && ipaNote ? ' &middot; '+ipaNote : ''}</div>
          </div>
        </div>
      </div>`);
    flip.querySelector(".speak").onclick = (e)=>{e.stopPropagation(); speak(c.it);};
    flip.querySelectorAll(".flash-star-btn").forEach(btn=>{
      btn.onclick = (e)=>{
        e.stopPropagation();
        const on = togglePref(c.id);
        flip.querySelectorAll(".flash-star-btn").forEach(b=>b.classList.toggle("starred", on));
        btn.title = on ? "Rimuovi dai preferiti" : "Aggiungi ai preferiti";
      };
    });
    flip.onclick = ()=>{
      if(flipped) return;
      flipped=true;
      flip.classList.add("flipped");
      controls.classList.remove("hidden");
      if(!itFront && 'speechSynthesis' in window) setTimeout(()=>speak(c.it), 200);
    };
    cardWrap.appendChild(flip);
    const controls = $(`
      <div class="row hidden" style="margin-top:14px">
        <button class="btn bad">Review again</button>
        <button class="btn good">Got it</button>
      </div>`);
    controls.children[0].onclick=()=>{haptic(false); grade(c.id,false); queue.push(c); advance();};   // riazzera e rimette in coda
    controls.children[1].onclick=()=>{haptic(true);  grade(c.id,true);  mastered++; advance();};       // pianifica avanti e prosegue
    cardWrap.appendChild(controls);
    if(itFront && 'speechSynthesis' in window) setTimeout(()=>speak(c.it), 150);
  }
  advance();
}

// ---------- MEMORY (abbinamento IT <-> EN a tempo) ----------
const MEM_BEST_KEY = "italiano_memory_best_v1";
function memBest(){ try{ return JSON.parse(localStorage.getItem(MEM_BEST_KEY)||"{}"); }catch(e){ return {}; } }
function fmtTime(s){ const m=Math.floor(s/60); return m+":"+String(s%60).padStart(2,"0"); }

function runMemory(){
  const stage = header();
  stage.appendChild($(`<div style="margin-bottom:14px">
    <b style="font-size:18px">Memory</b>
    <div style="font-size:13px;color:var(--muted);margin-top:2px">Gira le carte e abbina ogni parola italiana alla sua traduzione inglese</div>
  </div>`));
  const best = memBest();
  const levels = [[6,"Facile","6 coppie · 12 carte"],[8,"Medio","8 coppie · 16 carte"],[10,"Difficile","10 coppie · 20 carte"]];
  const list = $(`<div style="display:flex;flex-direction:column;gap:10px"></div>`);
  levels.forEach(([n,label,desc])=>{
    const rec = best[n] ? `Record: ${fmtTime(best[n])}` : "Nessun record";
    const btn = $(`<button class="tile wide">
      <div class="ico" style="background:rgba(245,158,11,.12)">&#129504;</div>
      <div class="txt">
        <div class="t">${label}</div>
        <div class="d">${desc} &middot; <span style="color:var(--accent2)">${rec}</span></div>
      </div>
    </button>`);
    btn.onclick = ()=>playMemory(n);

  stage.appendChild(list);
