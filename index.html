function playMemory(pairs){
  const pool = [...(DB.dizionario||[]), ...(userStore().voci||[])].filter(w=>w.it && w.en);
  if(pool.length < pairs){
    const stage = header();
    stage.appendChild($(`<p class="muted" style="text-align:center;padding:30px">Non ci sono abbastanza parole per giocare.</p>`));
    return;
  }
  // Una carta italiana + una inglese per ogni parola; condividono la stessa chiave (id).
  let cards = [];
  sample(pool, pairs).forEach(w=>{
    cards.push({key:w.id, lang:"IT", text:w.it, say:w.it});
    cards.push({key:w.id, lang:"EN", text:w.en});
  });
  cards = shuffle(cards);

  const stage = header();
  stage.appendChild($(`<div style="text-align:center;margin-bottom:6px;font-size:13px;color:var(--muted)">Memory &middot; ${pairs} coppie</div>`));
  const statsEl = $(`<div class="mem-stats">
    <span>Tempo <b class="memTime">0:00</b></span>
    <span>Mosse <b class="memMoves">0</b></span>
    <span>Trovate <b class="memFound">0</b>/${pairs}</span>
  </div>`);
  stage.appendChild(statsEl);
  const grid = $(`<div class="mem-grid ${pairs<=6?'c3':'c4'}"></div>`);
  stage.appendChild(grid);

  let first=null, lock=false, moves=0, found=0, startTime=null, timer=null;
  const setStat = (cls,v)=>{ const e=statsEl.querySelector(cls); if(e) e.textContent=v; };
  function tick(){
    if(!document.body.contains(statsEl)){ clearInterval(timer); return; } // schermata abbandonata
    setStat(".memTime", fmtTime(Math.round((Date.now()-startTime)/1000)));
  }

  cards.forEach(c=>{
    const el = $(`<button class="mem-card">
      <div class="mem-inner">
        <div class="mem-face mem-back">?</div>
        <div class="mem-face mem-front"><span class="mem-lang">${c.lang}</span>${c.text}</div>
      </div>
    </button>`);
    el.onclick = ()=>flip(c, el);
    grid.appendChild(el);
  });

  function flip(c, el){
    if(lock || el.classList.contains("up") || el.classList.contains("done")) return;
    if(!startTime){ startTime=Date.now(); timer=setInterval(tick, 500); }
    el.classList.add("up");
    if(c.say && 'speechSynthesis' in window) speak(c.say);
    if(!first){ first={c, el}; return; }
    moves++; setStat(".memMoves", moves);
    const a = first; first = null;
    if(a.c.key===c.key){
      haptic(true);
      a.el.classList.add("done"); el.classList.add("done");
      grade(c.key, true);                 // un abbinamento giusto conta come ripasso SRS
      found++; setStat(".memFound", found);
      if(found===pairs) win();
    } else {
      haptic(false);
      lock = true;
      a.el.classList.add("miss"); el.classList.add("miss");
      setTimeout(()=>{
        a.el.classList.remove("up","miss"); el.classList.remove("up","miss");
        lock = false;
      }, 750);
    }
  }

  function win(){
    if(timer) clearInterval(timer);
    const secs = startTime ? Math.round((Date.now()-startTime)/1000) : 0;
    const best = memBest(), prev = best[pairs];
    const isBest = !prev || secs < prev;
    if(isBest){ best[pairs]=secs; localStorage.setItem(MEM_BEST_KEY, JSON.stringify(best)); }
    setTimeout(()=>{
      stage.innerHTML = `
        <div class="done">
          <div class="big">${isBest?"&#127942;":"&#127881;"}</div>
          <h2>${isBest?"Nuovo record!":"Completato!"}</h2>
          <p class="muted">Tempo ${fmtTime(secs)} &middot; ${moves} mosse${(!isBest&&prev)?`<br>Record: ${fmtTime(prev)}`:""}</p>
        </div>`;
      haptic(true);
      const row=$(`<div class="row"></div>`);
      const home=$(`<button class="btn">Home</button>`); home.onclick=()=>history.back();
      const again=$(`<button class="btn primary">Ancora</button>`); again.onclick=()=>playMemory(pairs);
      row.appendChild(home); row.appendChild(again); stage.appendChild(row);
    }, 500);
  }
}

function runConjugation(tenseFilter){
  const verbs = DB.verbi || [];
  if(!verbs.length){
    const stage = header();
    stage.appendChild($(`<p class="muted" style="text-align:center;padding:30px">Nessun verbo disponibile.</p>`));
    return;
  }

  // Tense picker
  if(tenseFilter===undefined){
    const stage = header();
    stage.appendChild($(`<h2 style="margin:0 0 6px;font-size:20px">Coniugazione</h2>`));
    stage.appendChild($(`<p style="color:var(--muted);margin:0 0 18px;font-size:14px">Scegli il tempo da allenare &mdash; ${verbs.length} verbi, ${CONJ_TENSES.length} tempi.</p>`));
    const mixBtn = $(`<button class="tile wide" style="margin-bottom:12px">
      <div class="ico">🎲</div>
      <div class="txt"><div class="t">Mix</div><div class="d">Tutti i tempi e tutti i modi insieme</div></div>
    </button>`);
    mixBtn.onclick = ()=>runConjugation(CONJ_TENSES.map(t=>t.key));
    stage.appendChild(mixBtn);
    const list = $(`<div style="display:flex;flex-direction:column;gap:8px"></div>`);
    let curModo = null;
    CONJ_TENSES.forEach(t=>{
      if(t.modo!==curModo){
        curModo = t.modo;
        list.appendChild($(`<div style="font-size:11.5px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 0">${t.modo}</div>`));
      }
      const btn = $(`<button class="tile wide">
        <div class="txt"><div class="t">${t.label}</div><div class="d">${t.comp?"Tempo composto":"Tempo semplice"}</div></div>
      </button>`);
      btn.onclick = ()=>runConjugation([t.key]);
      list.appendChild(btn);
    });
    stage.appendChild(list);
    return;
  }

  // Build the deck: prioritize most-due (verb, person, tense) cells, then sample
  const tenseKeys = tenseFilter;
  const all = [];
  verbs.forEach(v=>tenseKeys.forEach(tk=>{
    for(let p=0;p<6;p++){
      const cell = conjForm(v, tk, p);
      if(!cell) continue;
      all.push({inf:v.inf, en:v.en, tk, p, answer:cell.display, accept:cell.accept, id:`conj:${v.inf}:${tk}:${p}`});
    }
  }));
  if(!all.length){ history.back(); return; }
  const prioritized = all.sort((a,b)=>dueScore(b.id)-dueScore(a.id)).slice(0, Math.min(28, all.length));
  const deck = shuffle(prioritized).slice(0, Math.min(12, prioritized.length));

  let i=0, correct=0;
  const stage = header();
  const bar = progressBar(stage);
  const wrap = $(`<div style="width:100%"></div>`); stage.appendChild(wrap);

  function show(){
    if(i>=deck.length) return finish(stage, `Completato &middot; ${correct} / ${deck.length}`, ()=>runConjugation(tenseFilter));
    bar.style.width = (i/deck.length*100)+"%"; bar.setNum(i, deck.length);
    const q = deck[i];
    wrap.innerHTML = "";
    wrap.appendChild($(`
      <div style="background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 18px;text-align:center;box-shadow:var(--shadow-sm)">
        <div style="font-size:12px;color:var(--accent2);font-weight:700;text-transform:uppercase;letter-spacing:.6px">${tenseLabel(q.tk)}</div>
        <div style="font-size:26px;font-weight:800;margin:8px 0 2px">${q.inf}</div>
        <div style="font-size:13px;color:var(--muted)">${q.en}</div>
        <div style="font-size:28px;font-weight:800;margin:16px 0 2px">
          <span style="color:var(--muted);font-size:19px;font-weight:600">${conjPronoun(q.tk,q.p)}</span> _____
        </div>
      </div>`));
    const inp = document.createElement("input");
    inp.className = "vocab-input";
    inp.type = "text";
    inp.placeholder = "Scrivi la coniugazione…";
    inp.style.marginTop = "14px";
    inp.setAttribute("autocomplete","off");
    inp.setAttribute("autocorrect","off");
    inp.setAttribute("autocapitalize","none");
    inp.setAttribute("spellcheck","false");
    wrap.appendChild(inp);
    const fb = $(`<div style="min-height:24px;text-align:center;margin-top:10px;font-size:14px"></div>`);
    wrap.appendChild(fb);
    const btn = $(`<button class="btn primary" style="width:100%;margin-top:6px">Controlla</button>`);
    wrap.appendChild(btn);

    let answered = false;
    function next(){ i++; show(); }
    function check(){
      const val = normConj(inp.value);
      if(!val) return;
      answered = true;
      const accepts = (q.accept||[q.answer]).map(normConj);
      const exact = accepts.includes(val);
      const loose = !exact && accepts.some(a=>stripAcc(val)===stripAcc(a));
      const ok = exact || loose;
      grade(q.id, ok); if(ok) correct++;
      haptic(ok);
      inp.disabled = true;
      inp.style.borderColor = ok ? "var(--good)" : "var(--accent)";
      if(exact){
        fb.innerHTML = `<span style="color:var(--good);font-weight:700">&#10003; Corretto!</span>`;
      } else if(loose){
        fb.innerHTML = `<span style="color:#b45309;font-weight:700">&#10003; Quasi! Attento agli accenti: <b>${q.answer}</b></span>`;
      } else {
        fb.innerHTML = `<span style="color:var(--accent);font-weight:700">&#10007; Risposta: <b>${q.answer}</b></span>`;
      }
      speak(q.answer);
      btn.textContent = "Avanti →";
      btn.onclick = next;
    }
    btn.onclick = check;
    inp.addEventListener("keydown", e=>{
      if(e.key!=="Enter") return;
      e.preventDefault();
      answered ? next() : check();
    });
    setTimeout(()=>inp.focus(), 60);
  }
  show();
}


function runPhrase(level){
  if(level === undefined){
    const stage = header();
    stage.appendChild($(`<h2 style="margin:0 0 6px;font-size:20px">Sentences</h2>`));
    stage.appendChild($(`<p style="color:var(--muted);margin:0 0 20px;font-size:14px">Scegli il livello di difficoltà:</p>`));
    const levels = [
      [1,'⭐ Facile','Frasi semplici — vocabolario di base'],
      [2,'⭐⭐ Medio','Frasi di complessità media'],
      [3,'⭐⭐⭐ Difficile','Frasi avanzate — congiuntivo, condizionale'],
      [0,'🎲 Mix','Livelli misti — selezionati a caso'],
    ];
    levels.forEach(([lvl,label,desc])=>{
      const btn=$(`<button class="tile wide" style="margin-bottom:10px">
        <div class="txt"><div class="t">${label}</div><div class="d">${desc}</div></div>
      </button>`);
      btn.onclick=()=>runPhrase(lvl);
      stage.appendChild(btn);
    });
    return;
  }

  const SKIP = new Set(['il','lo','la','i','gli','le','un','una','uno','di','da','in','con','su','per','tra','fra','a','e','o','ma','se','che','non','è','si','ci','vi','mi','ti','ho','ha','ai','al','del','della','dello','delle','dei','degli','nel','nella','nelle','nei','negli','sul','sulla','sulle','sui','sugli','dal','dalla','dalle','dai','dagli','alla','alle','agli','come','più','già','anche','molto','poi','così','però','quando','dove','cui','chi']);

  // Pool of content words from frasi + dizionario for distractors
  const corpusWords = [...new Set([
    ...(DB.frasi||[]).flatMap(f=>(f.it||"").replace(/[.!?,;:]/g,'').split(" ").map(w=>w.trim())),
    ...(DB.dizionario||[]).map(v=>(v.it||"").replace(/[.,!?;:]/g,'').split(" ")[0])
  ].filter(w=>w.length>=4 && !SKIP.has(w.toLowerCase())))];

  // Tag-indexed pools: words grouped by each tag from frasi (for thematic distractors)
  const tagWordPool={};
  (DB.frasi||[]).forEach(f=>{
    const tags=Array.isArray(f.tag)?f.tag:[f.tag||'vari'];
    tags.forEach(t=>{
      if(!tagWordPool[t]) tagWordPool[t]=[];
      (f.it||'').replace(/[.!?,;:]/g,'').split(' ').forEach(raw=>{
        const w=raw.trim();
        if(w.length>=4 && !SKIP.has(w.toLowerCase())) tagWordPool[t].push(w);
      });
    });
  });
  Object.keys(tagWordPool).forEach(t=>{ tagWordPool[t]=[...new Set(tagWordPool[t])]; });

  // POS lookup from dizionario base forms (noun / verb / adjective / adverb)
  const posLookup={};
  (DB.dizionario||[]).forEach(d=>{
    const w=(d.it||'').toLowerCase().replace(/[.,!?;:]/g,'').split(' ')[0];
    if(w && d.pos) posLookup[w]=d.pos;
  });

  // Pick plausible distractors: same topic → same POS → same morphological ending
  function plausibleDistractors(answer, exclude, tags){
    const lo=answer.toLowerCase();
    const e3=lo.slice(-3), e2=lo.slice(-2);
    const answerPos=posLookup[lo]||null;
    const tagList=Array.isArray(tags)?tags:[tags||'vari'];
    const base=w=>w!==answer && !exclude.has(w);
    const samePos=w=>{ const p=posLookup[w.toLowerCase()]; return !p||!answerPos||p===answerPos; };
    const end3=w=>w.toLowerCase().slice(-3)===e3;
    const end2=w=>w.toLowerCase().slice(-2)===e2;
    // Words from sentences that share any tag with the current sentence
    const tagPool=[...new Set(tagList.flatMap(t=>tagWordPool[t]||[]))].filter(base);
    const corpus=corpusWords.filter(base);
    const tries=[
      tagPool.filter(samePos).filter(end3),
      tagPool.filter(end3),
      tagPool.filter(samePos),
      tagPool,
      corpus.filter(samePos).filter(end3),
      corpus.filter(end3),
      corpus.filter(end2),
      corpus.filter(w=>Math.abs(w.length-lo.length)<=2),
    ];
    for(const c of tries) if(c.length>=3) return c;
    return tries[tries.length-1]||corpus;
  }

  const allFrasi = DB.frasi||[];
  const filtered = level===0 ? allFrasi : allFrasi.filter(f=>f.difficolta===level);
  const pool = filtered.length ? filtered : allFrasi;
  const deck = sample(pool, Math.min(8, pool.length));
  if(!deck.length) return;
  let i=0;
  const stage = header();
  const bar = progressBar(stage);
  const wrap = $(`<div style="width:100%"></div>`); stage.appendChild(wrap);
  function show(){
    if(i>=deck.length) return finish(stage,"Section complete", runPhrase);
    bar.style.width=(i/deck.length*100)+"%"; bar.setNum(i, deck.length);
    const f=deck[i];
    const sentence = f.it || "";
    const rawWords = sentence.replace(/[.!?]/g,'').split(" ");
    const clean = rawWords.map(w=>w.replace(/[.,!?;:]/g,''));

    // Prefer content words (length ≥ 4, not a function word)
    const candidates = clean.map((w,idx)=>({w,idx}))
      .filter(({w})=>w.length>=4 && !SKIP.has(w.toLowerCase()));
    const {w: answer, idx: hideIdx} = candidates.length
      ? candidates[Math.floor(Math.random()*candidates.length)]
      : {w: clean[0], idx: 0};

    const masked = rawWords.map((w,idx)=>idx===hideIdx?"_____":w).join(" ");

    // Distractors: plausible — same topic, same POS, same morphological ending
    const distract = sample(plausibleDistractors(answer, new Set(clean), f.tag), 3);
    const opts = shuffle([answer, ...distract]);

    wrap.innerHTML="";
    wrap.appendChild($(`<div class="q">${masked}</div>`));
    wrap.appendChild($(`<div class="qsub">${f.en||""}</div>`));
    const sp=$(`<button class="btn" style="margin:14px 0">&#128266; Listen to sentence</button>`);
    sp.onclick=()=>speak(sentence); wrap.appendChild(sp);
    const optBox=$(`<div class="options"></div>`);
    opts.forEach(o=>{
      const b=$(`<button class="opt">${o}</button>`);
      b.onclick=()=>{
        [...optBox.children].forEach(c=>c.disabled=true);
        const ok=o===answer;
        b.classList.add(ok?"correct":"wrong");
        if(!ok)[...optBox.children].find(c=>c.textContent===answer).classList.add("correct");
        haptic(ok);
        grade(f.id, ok);
        speak(sentence);
        const next=$(`<button class="btn primary" style="margin-top:14px">Continue &#8594;</button>`);
        next.onclick=()=>{i++; show();}; wrap.appendChild(next);
      };
      optBox.appendChild(b);
    });
    wrap.appendChild(optBox);
  }
  show();
}

function runVocabolario(){
  const stage = header();
  const words = [...(DB.dizionario||[]), ...(userStore().voci||[])];
  const POS_LABELS = {verb:'Verbi', noun:'Sostantivi', adjective:'Aggettivi', adverb:'Avverbi', pronoun:'Pronomi', other:'Altro'};
  const POS_COLORS = {verb:'rgba(47,107,237,.12)', noun:'rgba(22,163,74,.10)', adjective:'rgba(226,56,75,.10)', adverb:'rgba(255,165,0,.12)', other:'var(--card2)'};
  const POS_TC = {verb:'var(--accent2)', noun:'var(--good)', adjective:'var(--accent)', adverb:'#b45309', other:'var(--muted)'};
  let activePos = 'all', langpair = 'en|it';

  // Direction toggle
  const toggleWrap = $(`<div style="display:flex;gap:8px;width:100%;margin-bottom:10px"></div>`);
  const btnEN = $(`<button class="gram-chip active">EN &#8594; IT</button>`);
  const btnIT = $(`<button class="gram-chip">IT &#8594; EN</button>`);
  toggleWrap.appendChild(btnEN);
  toggleWrap.appendChild(btnIT);
  stage.appendChild(toggleWrap);

  // POS filter chips (affect local results)
  const chipsWrap = $(`<div class="gram-chips"></div>`);
  const allChip = $(`<button class="gram-chip active">Tutti (${words.length})</button>`);
  allChip.onclick = ()=>setPos('all');
  chipsWrap.appendChild(allChip);
  const posCounts = words.reduce((acc,w)=>{ acc[w.pos]=(acc[w.pos]||0)+1; return acc; }, {});
  Object.entries(POS_LABELS).forEach(([pos,label])=>{
    if(!posCounts[pos]) return;
    const ch = $(`<button class="gram-chip">${label} (${posCounts[pos]})</button>`);
    ch.onclick = ()=>setPos(pos);
    chipsWrap.appendChild(ch);
  });
  stage.appendChild(chipsWrap);

  // Search input
  const inputWrap = $(`<div style="position:relative;width:100%;margin-bottom:8px"></div>`);
  inputWrap.appendChild($(`<span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none">&#128269;</span>`));
  const inp = document.createElement('input');
  inp.className = 'vocab-input';
  inp.type = 'search';
  inp.placeholder = 'Cerca in inglese…';
  inp.setAttribute('autocomplete','off');
  inp.setAttribute('autocorrect','off');
  inp.setAttribute('spellcheck','false');
  inputWrap.appendChild(inp);
  stage.appendChild(inputWrap);

  const localSection = $(`<div style="display:flex;flex-direction:column;gap:8px;width:100%"></div>`);
  const onlineSection = $(`<div style="display:flex;flex-direction:column;gap:8px;width:100%;margin-top:4px"></div>`);
  stage.appendChild(localSection);
  stage.appendChild(onlineSection);

  // ---- Unified card builder ----
  function makeVocabCard(itWord, enTrans, {pos=null, posLabel=null, online=false, id=null}={}){
    const card = document.createElement('div');
    card.className = 'vocab-card' + (online ? ' online' : '');

    const top = document.createElement('div');
    top.style.cssText = 'display:flex;align-items:flex-start;gap:10px';

    const textDiv = document.createElement('div');
    textDiv.style.flex = '1';
    const itEl = document.createElement('div');
    itEl.className = 'vocab-it';
    itEl.textContent = itWord;
    const enEl = document.createElement('div');
    enEl.className = 'vocab-en';
    enEl.textContent = enTrans;
    textDiv.appendChild(itEl);
    textDiv.appendChild(enEl);

    const speakBtn = document.createElement('button');
    speakBtn.className = 'vocab-speak';
    speakBtn.title = 'Ascolta';
    speakBtn.innerHTML = '&#128266;';
    speakBtn.onclick = ()=>speak(itWord);

    top.appendChild(textDiv);
    if(online){
      const badge = document.createElement('span');
      badge.textContent = '🌐';
      badge.style.cssText = 'font-size:15px;flex-shrink:0;line-height:1;margin-top:5px';
      top.appendChild(badge);
    } else if(pos){
      const badge = document.createElement('span');
      badge.textContent = posLabel || pos;
      badge.style.cssText = `font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;background:${POS_COLORS[pos]||'var(--card2)'};color:${POS_TC[pos]||'var(--muted)'}`;
      top.appendChild(badge);
    }
    top.appendChild(speakBtn);
    if(id){
      const starBtn = document.createElement('button');
      starBtn.className = 'vocab-star-btn' + (isPref(id) ? ' starred' : '');
      starBtn.title = isPref(id) ? 'Rimuovi dai preferiti' : 'Aggiungi ai preferiti';
      starBtn.innerHTML = '&#9733;';
      starBtn.onclick = ()=>{
        const on = togglePref(id);
        starBtn.classList.toggle('starred', on);
        starBtn.title = on ? 'Rimuovi dai preferiti' : 'Aggiungi ai preferiti';
      };
      top.appendChild(starBtn);
    }
    card.appendChild(top);

    // Save to flashcards
    const addBtn = document.createElement('button');
    addBtn.className = 'add-flash-btn';
    const alreadySaved = isUserVoce(itWord) || (DB && (DB.dizionario||[]).some(d=>d.it===itWord));
    function setAdded(){ addBtn.textContent='✓ In flashcards'; addBtn.disabled=true; addBtn.style.color='var(--good)'; addBtn.style.borderColor='var(--good)'; }
    function setAdd(){ addBtn.textContent='＋ Salva in flashcards'; addBtn.disabled=false; addBtn.style.color=''; addBtn.style.borderColor=''; }
    if(alreadySaved) setAdded(); else setAdd();
    addBtn.onclick = ()=>{
      addBtn.style.display = 'none';
      let selPos = pos||null, selTag = null;
      const POS_OPTS = [['verb','Verbo'],['noun','Sost.'],['adjective','Agg.'],['adverb','Avv.']];
      const posChips = POS_OPTS.map(([v,l])=>`<button class="tag-chip${selPos===v?' sel':''}" data-v="${v}">${l}</button>`).join('');
      const topicChips = Object.entries(TOPIC_LABELS).map(([v,l])=>`<button class="tag-chip" data-v="${v}">${TOPIC_ICONS[v]||''} ${l}</button>`).join('');
      const picker = $(`
        <div class="tag-picker">
          <label>Tipo</label>
          <div class="tag-chips pos-chips">${posChips}</div>
          <label>Argomento</label>
          <div class="tag-chips topic-chips">${topicChips}</div>
          <button class="tag-save">Salva in flashcards</button>
        </div>`);
      picker.querySelectorAll('.pos-chips .tag-chip').forEach(c=>{
        c.onclick=()=>{ picker.querySelectorAll('.pos-chips .tag-chip').forEach(x=>x.classList.remove('sel')); c.classList.add('sel'); selPos=c.dataset.v; };
      });
      picker.querySelectorAll('.topic-chips .tag-chip').forEach(c=>{
        c.onclick=()=>{ picker.querySelectorAll('.topic-chips .tag-chip').forEach(x=>x.classList.remove('sel')); c.classList.add('sel'); selTag=c.dataset.v; };
      });
      picker.querySelector('.tag-save').onclick=()=>{
        if(addUserVoce(itWord, enTrans, selPos, selTag)){ picker.remove(); setAdded(); }
      };
      card.appendChild(picker);
    };
    card.appendChild(addBtn);
    return card;
  }

  // ---- Local results ----
  function renderLocal(q){
    localSection.innerHTML = '';
    const ql = q.toLowerCase();
    const base = words.filter(w => activePos==='all' || w.pos===activePos);
    const filtered = q
      ? base.filter(w => w.it.toLowerCase().includes(ql) || w.en.toLowerCase().includes(ql))
      : base;
    if(!filtered.length){
      if(q) localSection.appendChild($(`<div class="results-hdr">&#128218; Locale &middot; 0 risultati</div>`));
      return;
    }
    const hdr = $(`<div class="results-hdr">&#128218; Locale &middot; ${filtered.length} parol${filtered.length===1?'a':'e'}</div>`);
    localSection.appendChild(hdr);
    filtered.slice(0, 60).forEach(w=>{
      localSection.appendChild(makeVocabCard(w.it, w.en, {pos:w.pos, posLabel:POS_LABELS[w.pos], id:w.id}));
    });
    if(filtered.length > 60){
      localSection.appendChild($(`<div style="text-align:center;padding:10px;color:var(--muted);font-size:13px">+ altri ${filtered.length-60} — affina la ricerca</div>`));
    }
  }

  // ---- Online search ----
  async function doOnline(q){
    if(!q || q.length<2){ onlineSection.innerHTML=''; return; }
    onlineSection.innerHTML='';
    const loadHdr = $(`<div class="results-hdr">&#127760; Online &middot; ricerca in corso…</div>`);
    onlineSection.appendChild(loadHdr);
    try{
      const r = await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(q)+"&langpair="+encodeURIComponent(langpair));
      const d = await r.json();
      if(inp.value.trim() !== q) return;
      onlineSection.innerHTML = '';
      if(d.responseStatus===200 && d.responseData?.translatedText){
        const main = d.responseData.translatedText;
        const itWord = langpair==='en|it' ? main : q;
        const enTrans = langpair==='en|it' ? q : main;
        const extras = (d.matches||[])
          .filter(m=>m.translation && m.translation!==main && parseFloat(m.quality||0)>50)
          .slice(0,4);
        const total = 1 + extras.length;
        onlineSection.appendChild($(`<div class="results-hdr">&#127760; Online &middot; ${total} risultat${total===1?'o':'i'}</div>`));
        onlineSection.appendChild(makeVocabCard(itWord, enTrans, {online:true}));
        extras.forEach(m=>{
          const itW = langpair==='en|it' ? m.translation : (m.segment||q);
          const enT = langpair==='en|it' ? (m.segment||q) : m.translation;
          onlineSection.appendChild(makeVocabCard(itW, enT, {online:true}));
        });
      } else {
        onlineSection.appendChild($(`<div class="results-hdr">&#127760; Online &middot; nessun risultato</div>`));
      }
    }catch(e){
      if(inp.value.trim() !== q) return;
      onlineSection.innerHTML = '';
      onlineSection.appendChild($(`<div class="results-hdr">&#127760; Online &middot; connessione non disponibile</div>`));
    }
  }

  function setPos(pos){
    activePos = pos;
    [...chipsWrap.children].forEach(ch=>{
      ch.classList.toggle('active',
        (pos==='all' && ch===allChip) ||
        (pos!=='all' && ch.textContent.startsWith(POS_LABELS[pos]||''))
      );
    });
    renderLocal(inp.value.trim());
  }

  function setDir(dir){
    langpair = dir;
    btnEN.classList.toggle('active', dir==='en|it');
    btnIT.classList.toggle('active', dir==='it|en');
    inp.placeholder = dir==='en|it' ? 'Cerca in inglese…' : 'Cerca in italiano…';
    inp.value = '';
    onlineSection.innerHTML = '';
    renderLocal('');
  }

  btnEN.onclick = ()=>setDir('en|it');
  btnIT.onclick = ()=>setDir('it|en');

  let debounceLocal=null, debounceOnline=null;
  inp.addEventListener('input', ()=>{
    clearTimeout(debounceLocal);
    clearTimeout(debounceOnline);
    const q = inp.value.trim();
    debounceLocal = setTimeout(()=>renderLocal(q), 50);
    if(q.length>=2) debounceOnline = setTimeout(()=>doOnline(q), 500);
    else onlineSection.innerHTML='';
  });

  renderLocal('');
  setTimeout(()=>inp.focus(), 80);
}

function runMCQ(questions, title, restart){
  let i=0, correct=0;
  const stage = header();
  const bar = progressBar(stage);
  const wrap = $(`<div style="width:100%"></div>`); stage.appendChild(wrap);
  function show(){
    if(i>=questions.length) return finish(stage, `${title}: ${correct}/${questions.length}`, restart);
    bar.style.width=(i/questions.length*100)+"%"; bar.setNum(i, questions.length);
    const Q=questions[i];
    wrap.innerHTML="";
    wrap.appendChild($(`<div class="q">${Q.q}</div>`));
    if(Q.speak){ const sp=$(`<button class="btn" style="margin:0 0 6px">&#128266;</button>`); sp.onclick=()=>speak(Q.speak); wrap.appendChild(sp); }
    wrap.appendChild($(`<div class="qsub">${Q.sub}</div>`));
    const box=$(`<div class="options" style="margin-top:16px"></div>`);
    Q.opts.forEach(o=>{
      const b=$(`<button class="opt">${o}</button>`);
      b.onclick=()=>{
        [...box.children].forEach(c=>c.disabled=true);
        const ok=o===Q.correct;
        b.classList.add(ok?"correct":"wrong");
        haptic(ok);
        if(ok) correct++;
        else [...box.children].find(c=>c.textContent===Q.correct).classList.add("correct");
        if(Q.id) grade(Q.id, ok);
        if(Q.speak) speak(Q.speak);
        const next=$(`<button class="btn primary" style="margin-top:16px">${i+1<questions.length?"Next &#8594;":"Results"}</button>`);
        next.onclick=()=>{i++; show();}; wrap.appendChild(next);
      };
      box.appendChild(b);
    });
    wrap.appendChild(box);
  }
  show();
}

function runArticoli(){
  const DEF = ["il","lo","la","l'"];
  const IND = ["un","uno","una","un'"];
  const qs = shuffle(ARTICOLI_NOMI).slice(0, 15).map(n=>{
    const useDef = Math.random() < 0.5;
    const gTag = n.g==="m" ? "maschile" : "femminile";
    const kind = useDef ? "determinativo" : "indeterminativo";
    return {
      q: `___ ${n.it}`,
      sub: `<i>${n.en}</i> &middot; ${gTag} &mdash; scegli l'articolo <b>${kind}</b>`,
      opts: useDef ? DEF : IND,
      correct: useDef ? n.def : n.ind,
      speak: n.it
    };
  });
  runMCQ(qs, "Articoli", runArticoli);
}

function finish(stage, msg, restart){
  const m = String(msg).match(/(\d+)\s*\/\s*(\d+)/);
  let topHtml = `<div class="big">&#127881;</div>`;
  if(m){
    const got=+m[1], tot=+m[2], pct = tot ? Math.round(got/tot*100) : 0;
    const col = pct>=80 ? 'var(--good)' : pct>=50 ? 'var(--accent2)' : 'var(--accent)';
    topHtml = `<div class="ring" style="--col:${col};background:conic-gradient(${col} ${pct*3.6}deg,var(--card2) 0)"><span>${pct}%</span></div>`;
  }
  stage.innerHTML = `
    <div class="done">
      ${topHtml}
      <h2>${msg}</h2>
      <p class="muted">Great work! Progress saved on this device.</p>
    </div>`;
  haptic(true);
  const row=$(`<div class="row"></div>`);
  const a=$(`<button class="btn">Home</button>`); a.onclick=()=>history.back();
  const b=$(`<button class="btn primary">Again</button>`); b.onclick=restart;
  row.appendChild(a); row.appendChild(b); stage.appendChild(row);
}

const SOFIA_KEY = "sofia_gemini_key";
const SOFIA_WS  = "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent";
const SOFIA_REST= "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent";

function sofiaPrompt(lang, db, opts={}){
  const vocab = (db.voci||[]).slice(0,60).map(v=>`${v.it}=${v.en}`).join(", ");
  const frasi = (db.frasi||[]).slice(0,20).map(f=>`${f.it}=${f.en}`).join("; ");
  const rule = lang==="it+en"
    ? "You are bilingual Italian-English. Italian is the primary language: always reply in Italian. You may add brief English explanations in parentheses. The student may speak in either language. Gently correct errors."
    : "Speak ONLY in Italian. Corrections must also be in Italian.";
  const modeRule = {
    correction: "CORRECTION MODE: after each student reply, correct every grammatical or lexical error and briefly explain why. Then respond to the content.",
    roleplay:   "ROLE-PLAY MODE: simulate a real-world situation (cafe, job interview, news discussion). Stay in character. Use B2-appropriate vocabulary.",
    free: ""
  }[opts.practiceMode||"free"] || "";
  const srsLine = (opts.srsStats && opts.srsStats.total>0)
    ? `The student has consolidated ${opts.srsStats.known} items out of ${opts.srsStats.total}. Prefer vocabulary they have already studied.`
    : "";
  const memLine = opts.lastSession ? `Previous session:\n${opts.lastSession}` : "";
  return [
    "You are Andrea, a patient and encouraging Italian tutor.",
    "The student is at B2 level aiming for C1. They are a native English speaker.",
    "Focus on: subjunctive, conditional, double pronouns, passive voice, reported speech, advanced connectors.",
    rule, modeRule, srsLine, memLine,
    `Vocabulary studied: ${vocab}.`,
    `Phrases studied: ${frasi}.`,
    "Keep replies concise: 2-4 sentences max."
  ].filter(Boolean).join("\n");
}

class SofiaSession {
  constructor({apiKey,lang,db,onMsg,onStatus,practiceMode,srsStats,lastSession}){
    this.apiKey=apiKey; this.lang=lang; this.db=db;
    this.onMsg=onMsg; this.onStatus=onStatus;
    this.practiceMode=practiceMode||"free";
    this.srsStats=srsStats||null;
    this.lastSession=lastSession||"";
    this.mode=null; this.active=false;
    this.ws=null; this.audioCtx=null; this.micStream=null;
    this.playCtx=null; this.nextPlayTime=0;
    this.recognition=null; this.sofiaText="";
    this.gotSetup=false; this.fellBack=false;
    this.history=[]; this.userInputLang="it-IT";
  }
  _opts(){ return {practiceMode:this.practiceMode, srsStats:this.srsStats, lastSession:this.lastSession}; }
  setUserLang(l){
    this.userInputLang=l;
    if(this.mode==="rest"&&this.active){ try{this.recognition?.stop();}catch(e){} this.recognition=null; }
    if(this.mode==="live"&&this.recognition){ try{this.recognition.stop();}catch(e){} this.recognition=null; this._startSTT(); }
  }
  async connect(){ this.active=true; this.onStatus("connecting"); this._tryLive(); }
  _tryLive(){
    const ws=new WebSocket(`${SOFIA_WS}?key=${this.apiKey}`);
    this.ws=ws;
    const fallback=(note)=>{
      if(this.fellBack) return; this.fellBack=true;
      if(this.ws===ws){ this.ws=null; try{ws.close();}catch(e){} }
      if(note) this.onMsg({role:"sofia",text:note,final:true});
      this._startRest();
    };
    const timer=setTimeout(()=>fallback("Live timeout — switching to standard mode..."),10000);
    ws.onopen=()=>{
      ws.send(JSON.stringify({
        setup:{
          model:"models/gemini-2.5-flash-preview-native-audio-dialog",
          generationConfig:{
            responseModalities:["AUDIO"],
            speechConfig:{voiceConfig:{prebuiltVoiceConfig:{voiceName:"Aoede"}}}
          },
          systemInstruction:{parts:[{text:sofiaPrompt(this.lang,this.db,this._opts())}]}
        }
      }));
    };
    ws.onmessage=async e=>{
      let d; try{d=JSON.parse(e.data);}catch(err){return;}
      if(d.setupComplete){
        clearTimeout(timer); this.gotSetup=true; this.mode="live";
        this.onStatus("connected");
        await this._startMic(); this._startSTT();
      }
      if(d.serverContent){
        const sc=d.serverContent;
        if(sc.modelTurn?.parts){
          this.onStatus("speaking");
          for(const p of sc.modelTurn.parts){
            if(p.text){this.sofiaText+=p.text; this.onMsg({role:"sofia",text:this.sofiaText,final:false});}
            if(p.inlineData?.data) this._playChunk(p.inlineData.data);
          }
        }
        if(sc.turnComplete){
          if(this.sofiaText){this.onMsg({role:"sofia",text:this.sofiaText,final:true}); this.sofiaText="";}
          this.onStatus("listening");
        }
      }
      if(d.error){
        clearTimeout(timer);
        const msg=d.error.message||JSON.stringify(d.error);
        if(!this.gotSetup) fallback(`Live error (${msg}) — switching to standard mode...`);
        else{this.onMsg({role:"sofia",text:`Error: ${msg}`,final:true}); this.onStatus("error");}
      }
    };
    ws.onerror=()=>{ clearTimeout(timer); if(!this.gotSetup) fallback(null); };
    ws.onclose=(ev)=>{
      clearTimeout(timer);
      if(this.ws===ws) this.ws=null;
      if(!this.gotSetup) fallback(ev.reason?`Connection closed (${ev.code}) — switching to standard mode...`:null);
      else if(this.mode==="live") this.onStatus(ev.wasClean?"disconnected":"error");
    };
  }
  async _startRest(){ this.mode="rest"; this.onStatus("listening"); this._listen(); }
  async _chat(userText){
    if(!this.active) return;
    if(userText){ this.history.push({role:"user",parts:[{text:userText}]}); this.onMsg({role:"user",text:userText,final:true}); }
    this.onStatus("speaking");
    try{
      const body={
        system_instruction:{parts:[{text:sofiaPrompt(this.lang,this.db,this._opts())}]},
        contents:this.history.length
          ?this.history
          :[{role:"user",parts:[{text:"Greet the student in Italian and ask what they would like to practise today."}]}],
        generationConfig:{maxOutputTokens:140,temperature:0.8}
      };
      const resp=await fetch(`${SOFIA_REST}?key=${this.apiKey}`,
        {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(!resp.ok){const e=await resp.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${resp.status}`);}
      const data=await resp.json();
      const text=(data.candidates?.[0]?.content?.parts?.[0]?.text||"").trim();
      if(text){
        if(!this.history.length) this.history.push({role:"user",parts:[{text:"Greet the student in Italian and ask what they would like to practise today."}]});
        this.history.push({role:"model",parts:[{text}]});
        this.onMsg({role:"sofia",text,final:true});
        await this._speak(text);
      }
    }catch(e){
      this.onMsg({role:"sofia",text:`Error: ${e.message}`,final:true});
      this.onStatus("error"); return;
    }
    if(this.active){this.onStatus("listening"); this._listen();}
  }
  _listen(){
    if(!this.active) return;
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){this.onMsg({role:"sofia",text:"Speech recognition not supported. Try Chrome.",final:true}); return;}
    this.recognition=new SR();
    this.recognition.lang=this.userInputLang; this.recognition.continuous=false; this.recognition.interimResults=true;
    let interim=null;
    this.recognition.onresult=e=>{
      let t="",final=false;
      for(let i=e.resultIndex;i<e.results.length;i++){t+=e.results[i][0].transcript; if(e.results[i].isFinal) final=true;}
      this.onMsg({role:"user",text:t,final:false});
      if(final&&t.trim()) interim=t.trim();
    };
    this.recognition.onerror=()=>{};
    this.recognition.onend=()=>{
      if(this.active&&interim){this._chat(interim); interim=null;}
      else if(this.active){this.onStatus("listening"); this._listen();}
    };
    this.recognition.start();
  }
  async _speak(text){
    return new Promise(resolve=>{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang="it-IT"; if(itVoice) u.voice=itVoice; u.rate=0.88; u.pitch=1.1;
      u.onend=resolve; u.onerror=resolve;
      speechSynthesis.speak(u);
    });
  }
  async _startMic(){
    this.audioCtx=new AudioContext({sampleRate:16000});
    this.micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    const source=this.audioCtx.createMediaStreamSource(this.micStream);
    const code=`class P extends AudioWorkletProcessor{process(i){if(i[0]&&i[0][0])this.port.postMessage(i[0][0].slice());return true}}registerProcessor('pcm-sofia',P)`;
    const url=URL.createObjectURL(new Blob([code],{type:"application/javascript"}));
    await this.audioCtx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);
    const node=new AudioWorkletNode(this.audioCtx,"pcm-sofia");
    node.port.onmessage=({data})=>{
      if(!this.ws||this.ws.readyState!==WebSocket.OPEN) return;
      const i16=new Int16Array(data.length);
      for(let i=0;i<data.length;i++) i16[i]=Math.max(-32768,Math.min(32767,data[i]*32768));
      let b=""; const u8=new Uint8Array(i16.buffer);
      for(let i=0;i<u8.length;i++) b+=String.fromCharCode(u8[i]);
      this.ws.send(JSON.stringify({realtimeInput:{mediaChunks:[{mimeType:"audio/pcm;rate=16000",data:btoa(b)}]}}));
    };
    source.connect(node);
    this.onStatus("listening");
  }
  _startSTT(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR) return;
    this.recognition=new SR();
    this.recognition.lang=this.userInputLang; this.recognition.continuous=true; this.recognition.interimResults=true;
    this.recognition.onresult=e=>{
      let t="",final=false;
      for(let i=e.resultIndex;i<e.results.length;i++){t+=e.results[i][0].transcript; if(e.results[i].isFinal) final=true;}
      this.onMsg({role:"user",text:t,final});
    };
    this.recognition.onerror=()=>{};
    this.recognition.onend=()=>{if(this.ws?.readyState===WebSocket.OPEN) try{this.recognition.start();}catch(e){}};
    this.recognition.start();
  }
  _playChunk(b64){
    if(!this.playCtx||this.playCtx.state==="closed"){
      this.playCtx=new AudioContext({sampleRate:24000}); this.nextPlayTime=0;
    }
    const bin=atob(b64); const u8=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
    const i16=new Int16Array(u8.buffer); const f32=new Float32Array(i16.length);
    for(let i=0;i<i16.length;i++) f32[i]=i16[i]/32768;
    const buf=this.playCtx.createBuffer(1,f32.length,24000);
    buf.getChannelData(0).set(f32);
    const src=this.playCtx.createBufferSource();
    src.buffer=buf; src.connect(this.playCtx.destination);
    const t=Math.max(this.nextPlayTime,this.playCtx.currentTime+0.02);
    src.start(t); this.nextPlayTime=t+buf.duration;
  }
  disconnect(){
    this.active=false;
    try{this.recognition?.stop();}catch(e){} this.recognition=null;
    this.micStream?.getTracks().forEach(t=>t.stop());
    try{this.audioCtx?.close();}catch(e){}
    try{this.playCtx?.close();}catch(e){}
    if(this.ws){const ws=this.ws; this.ws=null; try{ws.close();}catch(e){}}
    speechSynthesis.cancel();
    this.onStatus("disconnected");
  }
}

function runSofia(){

  let currentUserLang="it-IT";

  const btnBi=$(`<button class="btn" style="flex:0;padding:8px 18px;font-size:13px">&#127470;&#127481;&#127468;&#127463; Italian + English</button>`);

  const btnUsr_en=$(`<button class="btn" style="flex:0;padding:6px 14px;font-size:12px">&#127468;&#127463; Speak English</button>`);
  function setUserInputLang(l){
    currentUserLang=l;
    btnUsr_it.style.borderColor=l==="it-IT"?"var(--accent2)":""; btnUsr_it.style.color=l==="it-IT"?"var(--accent2)":"";
    btnUsr_en.style.borderColor=l==="en-US"?"var(--accent2)":""; btnUsr_en.style.color=l==="en-US"?"var(--accent2)":"";

  }
  btnUsr_it.onclick=()=>setUserInputLang("it-IT");
  btnUsr_en.onclick=()=>setUserInputLang("en-US");
  userLangRow.appendChild(btnUsr_it); userLangRow.appendChild(btnUsr_en);
  function setLang(l){
    currentLang=l;
    btnIt.style.borderColor=l==="it"?"var(--accent2)":""; btnIt.style.color=l==="it"?"var(--accent2)":"";
    btnBi.style.borderColor=l==="it+en"?"var(--accent2)":""; btnBi.style.color=l==="it+en"?"var(--accent2)":"";

  }
  btnIt.onclick=()=>setLang("it"); btnBi.onclick=()=>setLang("it+en");
  langRow.appendChild(btnIt); langRow.appendChild(btnBi); stage.appendChild(langRow); stage.appendChild(userLangRow);
  setLang("it");

  const modeRow=$(`<div style="display:flex;gap:6px;justify-content:center;margin-bottom:14px;flex-wrap:wrap"></div>`);
  const modeBtns={
    free:       $(`<button class="btn" style="flex:0;padding:5px 13px;font-size:12px">&#128483; Conversation</button>`),
    correction: $(`<button class="btn" style="flex:0;padding:5px 13px;font-size:12px">&#9999; Correction</button>`),
    roleplay:   $(`<button class="btn" style="flex:0;padding:5px 13px;font-size:12px">&#127917; Role-play</button>`)
  };
  function setPracticeMode(m){
    currentPracticeMode=m;
    Object.entries(modeBtns).forEach(([k,b])=>{
      b.style.borderColor=k===m?"var(--accent2)":""; b.style.color=k===m?"var(--accent2)":"";

  Object.entries(modeBtns).forEach(([k,b])=>{ b.onclick=()=>setPracticeMode(k); modeRow.appendChild(b); });

    width:100%;background:var(--card2);border:1px solid var(--line);border-radius:16px;
    padding:14px 10px;overflow-y:auto;min-height:280px;max-height:420px;
    display:flex;flex-direction:column;gap:14px;margin-bottom:16px
  "></div>`);
  stage.appendChild(chatEl);

  function addBubble(role){
    let bub;
    if(role==="sofia"){
      const row=$(`<div class="sofia-msg-row"></div>`);
      const av=$(`<div class="sofia-av">&#129489;&#8205;&#127979;</div>`);
      sofiaAvEl=av;
      bub=$(`<div class="sofia-fumetto"></div>`);

    } else {
      const wrap=$(`<div style="display:flex;flex-direction:column;align-items:flex-end"></div>`);
      const lbl=$(`<div style="font-size:11px;color:var(--muted);margin-bottom:3px;padding:0 4px;text-align:right">You</div>`);
      bub=$(`<div style="
        background:linear-gradient(135deg,var(--accent2),#5b8cff);color:#fff;
        padding:10px 14px;border-radius:14px 4px 14px 14px;
        max-width:88%;font-size:15px;line-height:1.45;box-shadow:var(--shadow-sm)
      "></div>`);
      wrap.appendChild(lbl); wrap.appendChild(bub); chatEl.appendChild(wrap);
    }
    chatEl.scrollTop=chatEl.scrollHeight;
    return bub;
  }

  function addTranslateBtn(wrap, text){
    const key=localStorage.getItem(SOFIA_KEY);
    if(!key) return;
    const enDiv=$(`<div style="font-size:13px;color:var(--muted);margin-top:4px;padding:0 4px;display:none;line-height:1.4"></div>`);
    const btn=$(`<button style="margin-top:5px;border:none;background:none;cursor:pointer;font-size:12px;color:var(--muted);padding:0 4px">&#127468;&#127463; show translation</button>`);
    let cached=null;
    btn.onclick=async()=>{
      if(cached!==null){
        enDiv.style.display=enDiv.style.display==="none"?"block":"none";
        btn.textContent=enDiv.style.display==="none"?"show translation":"hide";
        return;
      }
      btn.textContent="..."; btn.disabled=true;
      try{
        const r=await fetch(`${SOFIA_REST}?key=${key}`,{method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            contents:[{role:"user",parts:[{text:`Translate to English only (no notes): "${text}"`}]}],
            generationConfig:{maxOutputTokens:80,temperature:0.2}
          })});
        const d=await r.json();
        cached=(d.candidates?.[0]?.content?.parts?.[0]?.text||"").trim();
      }catch(e){cached="";}
      if(cached){enDiv.textContent=cached; enDiv.style.display="block"; btn.textContent="hide";}
      else{btn.textContent="error"; setTimeout(()=>{btn.textContent="show translation"; btn.disabled=false;},2000); return;}
      btn.disabled=false;
    };
    wrap.appendChild(enDiv); wrap.appendChild(btn);
  }

  function onMsg({role,text,final}){
    if(role==="sofia"){
      if(!sofiaEl) sofiaEl=addBubble("sofia");
      sofiaEl.textContent=text;
      if(final){ const t=text; sofiaEl=null; if(lastSofiaWrap) addTranslateBtn(lastSofiaWrap,t); }
    } else {
      if(!userEl) userEl=addBubble("user");
      userEl.textContent=text;
      if(final) userEl=null;
    }
    chatEl.scrollTop=chatEl.scrollHeight;
  }

  const STATUS={
    connecting:"Connecting...",
    connected:"Connected — start speaking",
    listening:"Listening...",
    speaking:"Andrea is speaking...",
    error:"Connection failed — check your API key",
    disconnected:""
  };

  function onStatus(s){
    statusEl.textContent=STATUS[s]||"";
    if(sofiaAvEl) sofiaAvEl.classList.toggle("speaking", s==="speaking");
    const active=s==="connected"||s==="listening"||s==="speaking";
    const busy=s==="connecting";
    micBtn.textContent=active?"&#9209;":busy?"&#9203;":"&#127897;";
    micBtn.style.background=active
      ?"linear-gradient(135deg,var(--accent2),#5b8cff)"
      :busy?"var(--card2)"
      :"linear-gradient(135deg,var(--accent),#f0526a)";
    micBtn.style.color=busy?"var(--muted)":"#fff";
    micBtn.classList.toggle("mic-listening", s==="listening");
    micLabel.textContent=active?"Press to stop":busy?"Connecting...":"Press to talk with Andrea";
    if(s==="error"){
      const eb=addBubble("sofia");
      eb.textContent="Could not connect to Gemini. Check your API key and try again.";
      session=null; sofiaEl=null; userEl=null;
    }
    if(s==="disconnected"){
      if(session) sofiaSaveMem(session.history);
      session=null; sofiaEl=null; userEl=null;
    }
  }

  const micWrap=$(`<div style="text-align:center;margin-bottom:10px"></div>`);
  const micBtn=$(`<button style="
    width:76px;height:76px;border-radius:50%;border:none;font-size:30px;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),#f0526a);
    box-shadow:0 6px 20px rgba(226,56,75,.35);transition:.15s;color:#fff
  ">&#127897;</button>`);
  const micLabel=$(`<div style="margin-top:8px;font-size:12px;color:var(--muted)">Press to talk with Andrea</div>`);
  micWrap.appendChild(micBtn); micWrap.appendChild(micLabel); stage.appendChild(micWrap);

  micBtn.onclick=async()=>{
    if(session){ session.disconnect(); return; }
    const key=localStorage.getItem(SOFIA_KEY);
    if(!key){ showKeyModal(); return; }
    session=new SofiaSession({
      apiKey:key, lang:currentLang, db:DB, onMsg, onStatus,
      practiceMode:currentPracticeMode,
      srsStats:sofiaSrsStats(),
      lastSession:sofiaLoadMem()
    });
    session.userInputLang=currentUserLang;
    session.connect().catch(()=>onStatus("error"));
  };

  const hasKey=!!localStorage.getItem(SOFIA_KEY);
  const keyEl=$(`<p style="text-align:center;margin:4px 0 0"><a href="#" style="font-size:12px;color:var(--accent2)">${hasKey?"API key configured &#183; change":"Configure Gemini API key"}</a></p>`);
  keyEl.querySelector("a").onclick=e=>{e.preventDefault();showKeyModal();};
  stage.appendChild(keyEl);

  function showKeyModal(){
    const ov=$(`<div style="position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px">
      <div style="background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)">
        <h3 style="margin:0 0 8px;font-size:18px">Gemini API Key</h3>
        <p style="font-size:13px;color:var(--muted);margin:0 0 14px;line-height:1.55">
          Get your free key at <b>aistudio.google.com</b> &#8594; <b>Get API key</b>.<br>
          Stored only on this device.
        </p>
        <input id="kIn" type="password" placeholder="Paste your API key..." style="width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--text);font-size:15px;box-sizing:border-box;margin-bottom:14px">
        <div style="display:flex;gap:10px">
          <button class="btn" id="kCx" style="flex:1">Cancel</button>
          <button class="btn primary" id="kSv" style="flex:1">Save</button>
        </div>
      </div>
    </div>`);
    document.body.appendChild(ov);
    const inp=ov.querySelector("#kIn");
    inp.value=localStorage.getItem(SOFIA_KEY)||"";
    ov.querySelector("#kCx").onclick=()=>ov.remove();
    ov.querySelector("#kSv").onclick=()=>{
      const v=inp.value.trim();
      if(v){ localStorage.setItem(SOFIA_KEY,v); keyEl.querySelector("a").textContent="API key configured · change"; }
      ov.remove();
    };
    setTimeout(()=>inp.focus(),50);
  }
}

const darkMq = window.matchMedia ? matchMedia('(prefers-color-scheme: dark)') : null;
function syncThemeColor(){
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content', darkMq && darkMq.matches ? '#0d1220' : '#ffffff');
}
syncThemeColor();
if(darkMq && darkMq.addEventListener) darkMq.addEventListener('change', syncThemeColor);

function renderSkeleton(){
  app.innerHTML="";
  const sk=document.createElement("div");
  sk.innerHTML=
    `<div class="stats">${'<div class="stat sk"></div>'.repeat(4)}</div>`+
    `<div class="grid">${'<div class="tile sk"></div>'.repeat(4)}</div>`;
  app.appendChild(sk);
}

renderSkeleton();
fetch("knowledge.json?_="+Date.now())
  .then(r=>r.json())
  .then(db=>{
    const u = userStore();
    db.voci = [...db.voci, ...(u.voci||[])];
    DB=db; renderHome();
  })
  .catch(e=>{ app.innerHTML=`<div class="errbox"><div class="big">&#9888;</div><p>Could not load content.</p><button class="btn" onclick="location.reload()" style="max-width:200px">Retry</button><small>${e}</small></div>`; });

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js', {updateViaCache:'none'}).catch(()=>{});
}

setTimeout(()=>{
  const s=document.getElementById('splash');
  s.classList.add('fade-out');
  s.addEventListener('transitionend',()=>s.remove(),{once:true});
},1800);
</script>
</body>
</html>
