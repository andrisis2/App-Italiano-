<!DOCTYPE html>
<!--
  ⚠️ PAGINA LEGACY — NON USATA DALL'APP PRINCIPALE ⚠️
  L'app installata (PWA) usa SOLO index.html: questa pagina non è raggiungibile
  dai tile dell'app. Qualsiasi funzionalità aggiunta qui NON sarà mai vista
  dall'utente. Le nuove funzionalità vanno implementate in index.html.
  Vedi CLAUDE.md, sezione "Pagine standalone".
-->
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcard — Italiano A1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">
      <span class="flag">🇮🇹</span> Italiano A1
    </a>
    <ul class="nav-links">
      <li><a href="flashcard.html">Flashcard</a></li>
      <li><a href="fonetica.html">Fonetica</a></li>
      <li><a href="grammatica.html">Grammatica</a></li>
      <li><a href="frasi.html">Frasi</a></li>
    </ul>
  </div>
</nav>

<main class="page">

  <div class="page-header">
    <h1>🃏 Flashcard</h1>
    <p>Vocabolario italiano ↔ inglese — clicca la carta per girarla!</p>
    <div class="accent-bar"></div>
  </div>

  <!-- Direction toggle -->
  <div class="category-filter" id="directionToggle" style="margin-bottom:10px;">
    <button class="active" data-dir="it-en">🇮🇹 → 🇬🇧</button>
    <button data-dir="en-it">🇬🇧 → 🇮🇹</button>
  </div>

  <!-- Category filter -->
  <div class="category-filter" id="categoryFilter">
    <button class="active" data-cat="all">Tutte</button>
    <button data-cat="saluti">Saluti</button>
    <button data-cat="numeri">Numeri</button>
    <button data-cat="colori">Colori</button>
    <button data-cat="famiglia">Famiglia</button>
    <button data-cat="cibo">Cibo</button>
    <button data-cat="verbi">Verbi</button>
  </div>

  <!-- Progress bar -->
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <!-- Flashcard -->
  <div class="flashcard-container" id="flashcardContainer">
    <div class="flashcard-inner" id="flashcardInner">
      <div class="flashcard-face front" id="cardFront">
        <div class="category" id="cardCategory"></div>
        <div class="word" id="cardFrontWord"></div>
        <div class="hint" id="hintFront">Clicca per vedere la traduzione</div>
      </div>
      <div class="flashcard-face back" id="cardBack">
        <div class="category" id="cardCategoryBack" style="opacity:0.7;"></div>
        <div class="word" id="cardBackWord"></div>
        <div class="hint" id="hintBack" style="opacity:0.8;">Italiano → English</div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="flashcard-nav">
    <button class="btn btn-outline" id="btnPrev">← Indietro</button>
    <span class="progress-text" id="progressText">1 / 30</span>
    <button class="btn btn-outline" id="btnNext">Avanti →</button>
  </div>

  <div style="display:flex; justify-content:center; gap:12px; margin-top:18px; flex-wrap:wrap;">
    <button class="btn btn-green" id="btnFlip">🔄 Gira</button>
    <button class="btn-speaker" id="btnSpeak">🔊 Ascolta</button>
    <button class="btn btn-outline" id="btnShuffle">🔀 Mescola</button>
  </div>

  <!-- Stats -->
  <div class="card" style="margin-top:28px; text-align:center;">
    <div style="display:flex; justify-content:center; gap:32px; flex-wrap:wrap;">
      <div>
        <div style="font-size:2rem; font-weight:800; color:var(--green);" id="statTotal">30</div>
        <div style="font-size:0.88rem; color:#888;">Totale carte</div>
      </div>
      <div>
        <div style="font-size:2rem; font-weight:800; color:var(--red);" id="statSeen">0</div>
        <div style="font-size:0.88rem; color:#888;">Viste</div>
      </div>
      <div>
        <div style="font-size:2rem; font-weight:800; color:#1a73e8;" id="statRemaining">30</div>
        <div style="font-size:0.88rem; color:#888;">Rimanenti</div>
      </div>
    </div>
  </div>

</main>

<script src="app.js"></script>
<script>
const allCards = [
  { it: "Ciao",          en: "Hi / Bye",          cat: "saluti" },
  { it: "Buongiorno",    en: "Good morning",       cat: "saluti" },
  { it: "Buonasera",     en: "Good evening",       cat: "saluti" },
  { it: "Arrivederci",   en: "Goodbye",            cat: "saluti" },
  { it: "Prego",         en: "You're welcome",     cat: "saluti" },
  { it: "Grazie",        en: "Thank you",          cat: "saluti" },
  { it: "Scusa",         en: "Sorry / Excuse me",  cat: "saluti" },
  { it: "Per favore",    en: "Please",             cat: "saluti" },
  { it: "Uno",           en: "One",   cat: "numeri" },
  { it: "Due",           en: "Two",   cat: "numeri" },
  { it: "Tre",           en: "Three", cat: "numeri" },
  { it: "Quattro",       en: "Four",  cat: "numeri" },
  { it: "Cinque",        en: "Five",  cat: "numeri" },
  { it: "Sei",           en: "Six",   cat: "numeri" },
  { it: "Sette",         en: "Seven", cat: "numeri" },
  { it: "Otto",          en: "Eight", cat: "numeri" },
  { it: "Nove",          en: "Nine",  cat: "numeri" },
  { it: "Dieci",         en: "Ten",   cat: "numeri" },
  { it: "Rosso",         en: "Red",    cat: "colori" },
  { it: "Blu",           en: "Blue",   cat: "colori" },
  { it: "Verde",         en: "Green",  cat: "colori" },
  { it: "Giallo",        en: "Yellow", cat: "colori" },
  { it: "Bianco",        en: "White",  cat: "colori" },
  { it: "Nero",          en: "Black",  cat: "colori" },
  { it: "Arancione",     en: "Orange", cat: "colori" },
  { it: "Viola",         en: "Purple", cat: "colori" },
  { it: "La madre",      en: "The mother",       cat: "famiglia" },
  { it: "Il padre",      en: "The father",       cat: "famiglia" },
  { it: "Il fratello",   en: "The brother",      cat: "famiglia" },
  { it: "La sorella",    en: "The sister",       cat: "famiglia" },
  { it: "Il nonno",      en: "The grandfather",  cat: "famiglia" },
  { it: "La nonna",      en: "The grandmother",  cat: "famiglia" },
  { it: "Il figlio",     en: "The son",          cat: "famiglia" },
  { it: "La figlia",     en: "The daughter",     cat: "famiglia" },
  { it: "Il pane",       en: "The bread",   cat: "cibo" },
  { it: "L'acqua",       en: "The water",   cat: "cibo" },
  { it: "Il vino",       en: "The wine",    cat: "cibo" },
  { it: "La pizza",      en: "The pizza",   cat: "cibo" },
  { it: "La pasta",      en: "The pasta",   cat: "cibo" },
  { it: "Il caffè",      en: "The coffee",  cat: "cibo" },
  { it: "Il latte",      en: "The milk",    cat: "cibo" },
  { it: "Il formaggio",  en: "The cheese",  cat: "cibo" },
  { it: "Essere",        en: "To be",       cat: "verbi" },
  { it: "Avere",         en: "To have",     cat: "verbi" },
  { it: "Fare",          en: "To do / make",cat: "verbi" },
  { it: "Andare",        en: "To go",       cat: "verbi" },
  { it: "Venire",        en: "To come",     cat: "verbi" },
  { it: "Mangiare",      en: "To eat",      cat: "verbi" },
  { it: "Bere",          en: "To drink",    cat: "verbi" },
  { it: "Parlare",       en: "To speak",    cat: "verbi" },
  { it: "Leggere",       en: "To read",     cat: "verbi" },
  { it: "Dormire",       en: "To sleep",    cat: "verbi" },
];

let currentCards = [...allCards];
let currentIndex = 0;
let isFlipped = false;
let seenSet = new Set();
let direction = 'it-en';

const inner        = document.getElementById('flashcardInner');
const cardFrontWord = document.getElementById('cardFrontWord');
const cardBackWord  = document.getElementById('cardBackWord');
const hintFront    = document.getElementById('hintFront');
const hintBack     = document.getElementById('hintBack');
const cardCat      = document.getElementById('cardCategory');
const cardCatBack  = document.getElementById('cardCategoryBack');
const progressBar  = document.getElementById('progressBar');
const progressTxt  = document.getElementById('progressText');
const statTotal    = document.getElementById('statTotal');
const statSeen     = document.getElementById('statSeen');
const statRem      = document.getElementById('statRemaining');

function renderCard() {
  const card = currentCards[currentIndex];
  if (direction === 'it-en') {
    cardFrontWord.textContent = card.it;
    cardBackWord.textContent  = card.en;
    hintFront.textContent = 'Clicca per vedere la traduzione';
    hintBack.textContent  = 'Italiano → English';
  } else {
    cardFrontWord.textContent = card.en;
    cardBackWord.textContent  = card.it;
    hintFront.textContent = 'Click to see the translation';
    hintBack.textContent  = 'English → Italiano';
  }
  const catLabel = card.cat.charAt(0).toUpperCase() + card.cat.slice(1);
  cardCat.textContent = catLabel;
  cardCatBack.textContent = catLabel;
  isFlipped = false;
  inner.classList.remove('flipped');
  const pct = currentCards.length ? ((currentIndex + 1) / currentCards.length) * 100 : 0;
  progressBar.style.width = pct + '%';
  progressTxt.textContent = `${currentIndex + 1} / ${currentCards.length}`;
  seenSet.add(currentCards[currentIndex].it);
  statTotal.textContent = currentCards.length;
  statSeen.textContent = seenSet.size;
  statRem.textContent = Math.max(0, currentCards.length - seenSet.size);
}

function flipCard() {
  isFlipped = !isFlipped;
  inner.classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if (currentIndex < currentCards.length - 1) { currentIndex++; renderCard(); }
}

function prevCard() {
  if (currentIndex > 0) { currentIndex--; renderCard(); }
}

function shuffleCards() {
  for (let i = currentCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
  }
  currentIndex = 0;
  seenSet.clear();
  renderCard();
}

inner.addEventListener('click', flipCard);
document.getElementById('btnFlip').addEventListener('click', flipCard);
document.getElementById('btnNext').addEventListener('click', nextCard);
document.getElementById('btnPrev').addEventListener('click', prevCard);
document.getElementById('btnShuffle').addEventListener('click', shuffleCards);

document.getElementById('btnSpeak').addEventListener('click', function () {
  const card = currentCards[currentIndex];
  const utt = speak(card.it, 'it-IT');
  if (!utt) return;
  this.classList.add('speaking');
  utt.onend = () => this.classList.remove('speaking');
  utt.onerror = () => this.classList.remove('speaking');
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
});

document.getElementById('directionToggle').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#directionToggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  direction = btn.getAttribute('data-dir');
  currentIndex = 0;
  seenSet.clear();
  renderCard();
});

document.getElementById('categoryFilter').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#categoryFilter button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cat = btn.getAttribute('data-cat');
  currentCards = cat === 'all' ? [...allCards] : allCards.filter(c => c.cat === cat);
  currentIndex = 0;
  seenSet.clear();
  renderCard();
});

renderCard();
</script>
</body>
</html>
